server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite emits content-hashed asset filenames. These can be cached for a long
    # time, while the SPA entry document must be revalidated on every navigation
    # so mobile browsers do not keep running an old bundle after a deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }
}
