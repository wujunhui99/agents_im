name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  actions: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend_required: ${{ steps.filter.outputs.backend_required }}
      changed_files: ${{ steps.filter.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ -z "${base}" || "${base}" =~ ^0+$ ]]; then
              base="$(git rev-list --max-parents=0 "${head}" | tail -n1)"
            fi
          fi

          git diff --name-only "${base}" "${head}" | sort > /tmp/changed-files.txt
          changed_inline="$(paste -sd, /tmp/changed-files.txt || true)"
          backend_required=false
          saw_file=false

          while IFS= read -r file; do
            [[ -z "${file}" ]] && continue
            saw_file=true
            case "${file}" in
              .github/workflows/*|scripts/verify-*|scripts/migrate-postgres.sh|scripts/detect-deploy-changes.py|scripts/deploy-k3s.sh|scripts/test-deploy-k3s.sh|scripts/bootstrap-server.sh|Dockerfile|.dockerignore|docker-compose.yml|docker-compose.yaml|Makefile)
                backend_required=true
                ;;
              api/*|proto/*|cmd/*|internal/*|etc/*|db/*|tests/*|go.mod|go.sum)
                backend_required=true
                ;;
              deploy/*)
                backend_required=true
                ;;
              web/*|docs/*|*.md|README.md|ARCHITECTURE.md)
                ;;
              *)
                # Fail safe: unknown non-doc paths still run backend/PG gates.
                backend_required=true
                ;;
            esac
          done < /tmp/changed-files.txt

          if [[ "${saw_file}" == "false" ]]; then
            backend_required=true
          fi

          echo "backend_required=${backend_required}" >> "${GITHUB_OUTPUT}"
          echo "changed_files=${changed_inline}" >> "${GITHUB_OUTPUT}"
          echo "backend_required=${backend_required}"
          cat /tmp/changed-files.txt

  backend:
    name: Backend verification
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend_required == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go module cache
        uses: actions/cache/restore@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.sum') }}

      - name: Restore Go build cache
        id: go-build-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.sum') }}-${{ hashFiles('cmd/**/*.go', 'internal/**/*.go', 'tests/**/*.go', 'go.mod', 'go.sum') }}
          restore-keys: |
            go-build-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.sum') }}-
            go-build-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-

      - name: Download Go modules
        run: |
          start_epoch="$(date +%s)"
          go mod download
          end_epoch="$(date +%s)"
          echo "Go module download duration: $((end_epoch - start_epoch))s"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler ripgrep

      - name: Check gofmt
        run: |
          mapfile -t go_files < <(find . -name "*.go" -not -path "./web/node_modules/*" -print)
          if ((${#go_files[@]} == 0)); then
            exit 0
          fi
          unformatted="$(gofmt -l "${go_files[@]}")"
          if [[ -n "$unformatted" ]]; then
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Run Go tests
        run: |
          export PATH=/tmp/go/bin:$HOME/go/bin:$PATH
          echo "Go environment:"
          go env GOCACHE GOMODCACHE GOPATH GOVERSION GOFLAGS
          echo "Go cache sizes before tests:"
          du -sh "$(go env GOCACHE)" "$(go env GOMODCACHE)" || true
          mapfile -t packages < <(go list ./... | grep -v '/web/node_modules/')
          echo "Go package count: ${#packages[@]}"

          start_epoch="$(date +%s)"
          go test -json "${packages[@]}" | tee /tmp/go-test.json
          test_status="${PIPESTATUS[0]}"
          end_epoch="$(date +%s)"
          echo "Go test duration: $((end_epoch - start_epoch))s"
          echo "Go cache sizes after tests:"
          du -sh "$(go env GOCACHE)" "$(go env GOMODCACHE)" || true
          python3 - <<'PY'
          import json
          import sys
          from collections import defaultdict

          elapsed = defaultdict(float)
          failed = set()
          passed = set()
          with open('/tmp/go-test.json', encoding='utf-8', errors='replace') as fh:
              for line in fh:
                  try:
                      event = json.loads(line)
                  except json.JSONDecodeError:
                      continue
                  pkg = event.get('Package')
                  if not pkg:
                      continue
                  if 'Elapsed' in event:
                      elapsed[pkg] = max(elapsed[pkg], float(event['Elapsed']))
                  action = event.get('Action')
                  if action == 'fail':
                      failed.add(pkg)
                  elif action == 'pass':
                      passed.add(pkg)
          print('Go test slowest packages:')
          for pkg, seconds in sorted(elapsed.items(), key=lambda item: item[1], reverse=True)[:15]:
              print(f'{seconds:.2f}s {pkg}')
          if failed:
              print('Go test failed packages:', ', '.join(sorted(failed)), file=sys.stderr)
          print(f'Go test package summary: passed={len(passed)} failed={len(failed)} timed={len(elapsed)}')
          PY
          exit "${test_status}"

      - name: Save Go module cache
        if: always()
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.sum') }}

      - name: Save Go build cache
        if: always() && steps.go-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.sum') }}-${{ hashFiles('cmd/**/*.go', 'internal/**/*.go', 'tests/**/*.go', 'go.mod', 'go.sum') }}

      - name: Run static verification
        run: |
          export PATH=/tmp/go/bin:$HOME/go/bin:$PATH
          bash scripts/verify-static.sh

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Check markdown links
        run: |
          mapfile -t md_files < <(
            find . -name "*.md" \
              -not -path "./.git/*" \
              -not -path "./.ai-context/*" \
              -not -path "./docs/references/*" \
              -print
          )
          if ((${#md_files[@]} == 0)); then
            exit 0
          fi
          npx --yes markdown-link-check@3.13.7 --config .github/markdown-link-check.json "${md_files[@]}"

  postgres-integration:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend_required == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agents_im
          POSTGRES_USER: agents_im
          POSTGRES_PASSWORD: agents_im_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agents_im -d agents_im"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgres://agents_im:agents_im_dev_password@localhost:5432/agents_im?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go module cache
        uses: actions/cache/restore@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.sum') }}

      - name: Restore Go build cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.sum') }}-${{ hashFiles('cmd/**/*.go', 'internal/**/*.go', 'tests/**/*.go', 'go.mod', 'go.sum') }}
          restore-keys: |
            go-build-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.sum') }}-
            go-build-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run PostgreSQL migrations
        run: bash scripts/migrate-postgres.sh --host-psql

      - name: Verify PostgreSQL migrations are repeatable
        run: bash scripts/verify-postgres-migrations.sh

      - name: Verify old PostgreSQL schema upgrade
        run: bash scripts/verify-postgres-old-schema-upgrade.sh

      - name: Reset PostgreSQL schema after old-schema fixture
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          drop schema public cascade;
          create schema public;
          SQL
          bash scripts/migrate-postgres.sh --host-psql

      - name: Run PostgreSQL integration tests
        env:
          AGENTS_IM_SKIP_TEST_MIGRATIONS: "1"
        run: |
          export PATH=/tmp/go/bin:$HOME/go/bin:$PATH
          go test -tags=integration ./tests

  notify:
    name: Telegram notification
    runs-on: ubuntu-latest
    needs:
      - changes
      - backend
      - postgres-integration
    if: always()
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect workflow timing
        id: timing
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set +e
          gh run view "${RUN_ID}" --json jobs > /tmp/run-jobs.json
          gh_status="$?"
          set -e
          if [[ "${gh_status}" != "0" ]]; then
            echo "summary=timing unavailable" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          from datetime import datetime

          data = json.load(open('/tmp/run-jobs.json'))

          def parse(value):
              if not value:
                  return None
              return datetime.fromisoformat(value.replace('Z', '+00:00'))

          def fmt(seconds):
              if seconds is None:
                  return 'n/a'
              seconds = int(round(seconds))
              minutes, rem = divmod(seconds, 60)
              return f'{minutes}m{rem:02d}s' if minutes else f'{rem}s'

          lines = []
          for job in data.get('jobs', []):
              started = parse(job.get('startedAt'))
              completed = parse(job.get('completedAt'))
              duration = (completed - started).total_seconds() if started and completed else None
              lines.append(f"{job.get('name', 'unknown')}={job.get('conclusion') or job.get('status')} duration={fmt(duration)}")
          print('summary<<EOF')
          print('\n'.join(lines))
          print('EOF')
          PY

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          ACTIONS_NOTIFY_STATUS: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          ACTIONS_NOTIFY_DETAILS: |-
            changes=${{ needs.changes.result }} backend_required=${{ needs.changes.outputs.backend_required }}
            backend=${{ needs.backend.result }}
            postgres-integration=${{ needs.postgres-integration.result }}
          ACTIONS_NOTIFY_TIMING: ${{ steps.timing.outputs.summary }}
        run: bash scripts/notify-telegram-actions.sh
