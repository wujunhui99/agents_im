name: Deploy to k3s

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      build_required: ${{ steps.detect.outputs.build_required }}
      deploy_required: ${{ steps.detect.outputs.deploy_required }}
      config_only: ${{ steps.detect.outputs.config_only }}
      backend_services: ${{ steps.detect.outputs.backend_services }}
      web_required: ${{ steps.detect.outputs.web_required }}
      image_services: ${{ steps.detect.outputs.image_services }}
      image_services_space: ${{ steps.detect.outputs.image_services_space }}
      rollout_services: ${{ steps.detect.outputs.rollout_services }}
      restart_services: ${{ steps.detect.outputs.restart_services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          changed=()
          if [[ "${EVENT_NAME}" != "workflow_dispatch" ]]; then
            before="${BEFORE_SHA:-}"
            if [[ -z "${before}" || "${before}" =~ ^0+$ ]]; then
              if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
                before="HEAD^"
              else
                mapfile -t changed < <(git ls-files)
              fi
            fi
            if [[ ${#changed[@]} -eq 0 ]]; then
              mapfile -t changed < <(git diff --name-only "${before}" HEAD)
            fi
          fi

          outputs_file="$(mktemp)"
          python3 scripts/detect-deploy-changes.py \
            --event-name "${EVENT_NAME}" \
            --ref "${GITHUB_REF}" \
            "${changed[@]}" | tee "${outputs_file}"
          cat "${outputs_file}" >> "$GITHUB_OUTPUT"

  build-backend:
    name: Build backend image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.backend_services != '[]'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.backend_services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: backend
          build-args: |
            SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=backend-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.service }}

  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.web_required == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/web:${{ github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy on server
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-backend
      - build-web
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.deploy_required == 'true' &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-web.result == 'success' || needs.build-web.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_SET_IMAGE: ${{ needs.detect-changes.outputs.build_required == 'false' }}
          SKIP_MIDDLEWARE: ${{ needs.detect-changes.outputs.config_only }}
          SKIP_MIGRATIONS: ${{ needs.detect-changes.outputs.config_only }}
          IMAGE_SERVICES: ${{ needs.detect-changes.outputs.image_services_space }}
          ROLLOUT_SERVICES: ${{ needs.detect-changes.outputs.rollout_services }}
          RESTART_SERVICES: ${{ needs.detect-changes.outputs.restart_services }}
          RESTART_ROLLOUT: ${{ needs.detect-changes.outputs.restart_services != '' }}
        shell: bash
        run: |
          set -euo pipefail
          port="${SERVER_PORT:-22}"
          : "${SERVER_HOST:?SERVER_HOST secret is required}"
          : "${SERVER_USER:?SERVER_USER secret is required}"
          remote="${SERVER_USER}@${SERVER_HOST}"
          ssh_opts=(-o StrictHostKeyChecking=accept-new -p "${port}")

          ssh "${ssh_opts[@]}" "${remote}" 'mkdir -p /opt/agents-im/repo'
          tar \
            --exclude='.git' \
            --exclude='.dev' \
            --exclude='web/node_modules' \
            --exclude='web/dist' \
            -czf - . | ssh "${ssh_opts[@]}" "${remote}" 'tar -xzf - -C /opt/agents-im/repo'

          ssh "${ssh_opts[@]}" "${remote}" \
            "cd /opt/agents-im/repo && IMAGE_REGISTRY='${IMAGE_NAMESPACE}' IMAGE_TAG='${IMAGE_TAG}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' SKIP_SET_IMAGE='${SKIP_SET_IMAGE}' SKIP_MIDDLEWARE='${SKIP_MIDDLEWARE}' SKIP_MIGRATIONS='${SKIP_MIGRATIONS}' IMAGE_SERVICES='${IMAGE_SERVICES}' ROLLOUT_SERVICES='${ROLLOUT_SERVICES}' RESTART_SERVICES='${RESTART_SERVICES}' RESTART_ROLLOUT='${RESTART_ROLLOUT}' MIDDLEWARE_DIR=/opt/agents-im/middleware ./scripts/deploy-k3s.sh"

  notify:
    name: Telegram notification
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-backend
      - build-web
      - deploy
    if: always()
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          ACTIONS_NOTIFY_STATUS: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || needs.deploy.result == 'skipped' && 'skipped' || 'success' }}
          ACTIONS_NOTIFY_DETAILS: |-
            detect-changes=${{ needs.detect-changes.result }}
            build-backend=${{ needs.build-backend.result }}
            build-web=${{ needs.build-web.result }}
            deploy=${{ needs.deploy.result }}
        run: bash scripts/notify-telegram-actions.sh
