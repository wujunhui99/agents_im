name: Deploy to k3s

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      build_required: ${{ steps.detect.outputs.build_required }}
      deploy_required: ${{ steps.detect.outputs.deploy_required }}
      config_only: ${{ steps.detect.outputs.config_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "build_required=true" >> "$GITHUB_OUTPUT"
            echo "deploy_required=true" >> "$GITHUB_OUTPUT"
            echo "config_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [[ -z "${before}" || "${before}" =~ ^0+$ ]]; then
            before="HEAD^"
          fi

          mapfile -t changed < <(git diff --name-only "${before}" HEAD)
          build_required=false
          deploy_required=false

          for file in "${changed[@]}"; do
            case "${file}" in
              deploy/k8s/*|deploy/k8s/**|scripts/deploy-k3s.sh)
                deploy_required=true
                ;;
              .github/workflows/deploy.yml)
                deploy_required=true
                ;;
              docs/*|docs/**|README.md|*.md)
                ;;
              *)
                build_required=true
                deploy_required=true
                ;;
            esac
          done

          if [[ "${build_required}" == "true" ]]; then
            config_only=false
          else
            config_only="${deploy_required}"
          fi

          echo "build_required=${build_required}" >> "$GITHUB_OUTPUT"
          echo "deploy_required=${deploy_required}" >> "$GITHUB_OUTPUT"
          echo "config_only=${config_only}" >> "$GITHUB_OUTPUT"

  build-backend:
    name: Build backend image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.build_required == 'true'
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-api
          - auth-api
          - friends-api
          - message-api
          - gateway-ws
          - groups-api
          - agent-api
          - message-transfer
          - user-rpc
          - auth-rpc
          - friends-rpc
          - groups-rpc
          - message-rpc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: backend
          build-args: |
            SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=backend-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.service }}

  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.build_required == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/web:${{ github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy on server
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-backend
      - build-web
    if: >-
      always() &&
      needs.detect-changes.outputs.deploy_required == 'true' &&
      (
        needs.detect-changes.outputs.build_required == 'false' ||
        (needs.build-backend.result == 'success' && needs.build-web.result == 'success')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_SET_IMAGE: ${{ needs.detect-changes.outputs.build_required == 'false' }}
          SKIP_MIDDLEWARE: ${{ needs.detect-changes.outputs.config_only }}
          SKIP_MIGRATIONS: ${{ needs.detect-changes.outputs.config_only }}
          ROLLOUT_SERVICES: ${{ needs.detect-changes.outputs.config_only == 'true' && 'groups-rpc' || '' }}
          RESTART_ROLLOUT: ${{ needs.detect-changes.outputs.config_only }}
        shell: bash
        run: |
          set -euo pipefail
          port="${SERVER_PORT:-22}"
          : "${SERVER_HOST:?SERVER_HOST secret is required}"
          : "${SERVER_USER:?SERVER_USER secret is required}"
          remote="${SERVER_USER}@${SERVER_HOST}"
          ssh_opts=(-o StrictHostKeyChecking=accept-new -p "${port}")

          ssh "${ssh_opts[@]}" "${remote}" 'mkdir -p /opt/agents-im/repo'
          tar \
            --exclude='.git' \
            --exclude='.dev' \
            --exclude='web/node_modules' \
            --exclude='web/dist' \
            -czf - . | ssh "${ssh_opts[@]}" "${remote}" 'tar -xzf - -C /opt/agents-im/repo'

          ssh "${ssh_opts[@]}" "${remote}" \
            "cd /opt/agents-im/repo && IMAGE_REGISTRY='${IMAGE_NAMESPACE}' IMAGE_TAG='${IMAGE_TAG}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' SKIP_SET_IMAGE='${SKIP_SET_IMAGE}' SKIP_MIDDLEWARE='${SKIP_MIDDLEWARE}' SKIP_MIGRATIONS='${SKIP_MIGRATIONS}' ROLLOUT_SERVICES='${ROLLOUT_SERVICES}' RESTART_ROLLOUT='${RESTART_ROLLOUT}' MIDDLEWARE_DIR=/opt/agents-im/middleware ./scripts/deploy-k3s.sh"
