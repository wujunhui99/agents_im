Name: gateway-ws
Host: 0.0.0.0
Port: 8084
Tracing:
  Enabled: false
  ServiceName: gateway-ws
  Environment: local
  Protocol: grpc
  SamplerRatio: 1.0
  TraceUIBaseURL: http://localhost:3000
  Insecure: true

Auth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
StorageDriver: memory
DataSource: ${DATABASE_URL}
Presence:
  Driver: memory
  HeartbeatTTLSeconds: 60
  KeyPrefix: agents_im:presence
GatewayWS:
  AllowedOrigins: http://localhost:5173,http://127.0.0.1:5173
  AllowQueryToken: true
  PingIntervalSeconds: 30
  HeartbeatTimeoutSeconds: 75
  CommandRateLimitPerSecond: 20
  CommandRateLimitBurst: 40
