Name: msg-api
Host: 0.0.0.0
Port: 8090

Auth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
MsgRPC:
  Endpoints:
    - 127.0.0.1:9098
  Timeout: 5000
AdminRPC:
  Endpoints:
    - 127.0.0.1:9097
  Timeout: 5000
# go-zero 自带 tracing：本地上报到 docker-compose 的 tempo（OTLP gRPC）。
Telemetry:
  Name: msg-api
  Endpoint: 127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc

Redis:
  Addr: localhost:6379
  Password: ""
  DB: 0
