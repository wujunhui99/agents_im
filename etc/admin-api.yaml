Name: admin-api
Host: 0.0.0.0
Port: 8088

Auth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
# admin-api 改纯 BFF：所有 DB 访问走 admin-rpc，不再有 StorageDriver/DataSource。
AdminRPC:
  Endpoints:
    - 127.0.0.1:9097
  Timeout: 5000
# UserRPC/AuthRPC：BFF 编排「创建测试账户」和「AdminBootstrap」。
UserRPC:
  Endpoints:
    - 127.0.0.1:9090
  Timeout: 5000
AuthRPC:
  Endpoints:
    - 127.0.0.1:9091
  Timeout: 5000
AdminBootstrap:
  Identifier: amin
  Password: ${ADMIN_BOOTSTRAP_PASSWORD}
  DisplayName: 管理后台管理员

Redis:
  Addr: localhost:6379
  Password: ""
  DB: 0

Telemetry:
  Name: admin-api
  Endpoint: 127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc
