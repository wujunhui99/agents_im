Name: user-rpc
ListenOn: 0.0.0.0:9090

JWTAuth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
DataSource: ${DATABASE_URL}

# MediaRPC：头像 media 校验经属主 media-rpc（#533）。
MediaRPC:
  Endpoints:
    - 127.0.0.1:9096
  Timeout: 5000

# 默认助手开通编排（#606）：agent 域装配经 agent-rpc、好友建立经 friends-rpc（单向叶子，不成环）。
AgentRPC:
  Endpoints:
    - 127.0.0.1:9099
  Timeout: 5000
FriendsRPC:
  Endpoints:
    - 127.0.0.1:9092
  Timeout: 5000

Telemetry:
  Name: user-rpc
  Endpoint: 127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc
