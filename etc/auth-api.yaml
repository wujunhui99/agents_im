Name: auth-api
Host: 0.0.0.0
Port: 8081
Tracing:
  Enabled: false
  ServiceName: auth-api
  Environment: local
  Protocol: grpc
  SamplerRatio: 1.0
  TraceUIBaseURL: http://localhost:3000
  Insecure: true

Auth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
AuthRPC:
  Endpoints:
    - 127.0.0.1:9091
  Timeout: 5000
