Name: auth-rpc
ListenOn: 0.0.0.0:9091

TokenAuth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
StorageDriver: memory
DataSource: ${DATABASE_URL}
MailRPC:
  Endpoints:
    - 127.0.0.1:9095
  Timeout: 5000

SessionRedis:
  Addr: localhost:6379
  Password: ""
  DB: 0

Telemetry:
  Name: auth-rpc
  Endpoint: 127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc
