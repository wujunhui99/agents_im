Name: auth-rpc
ListenOn: 0.0.0.0:9091
Tracing:
  Enabled: false
  ServiceName: auth-rpc
  Environment: local
  Protocol: grpc
  SamplerRatio: 1.0
  JaegerBaseURL: http://localhost:16686
  Insecure: true

TokenAuth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
StorageDriver: memory
DataSource: ${DATABASE_URL}
MailRPC:
  Endpoints:
    - 127.0.0.1:9095
  Timeout: 5000
