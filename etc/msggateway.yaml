Name: msggateway
Host: 0.0.0.0
Port: 8084

# 下行推送 gRPC server（03 §6.2）：service/push 调 BatchPushOneMsg 投递给本实例连接。
GatewayGRPC:
  ListenOn: 0.0.0.0:9101

Auth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
MsgRPC:
  Target: dns:///127.0.0.1:9098
  Timeout: 5000
Presence:
  Driver: memory
  HeartbeatTTLSeconds: 60
  KeyPrefix: agents_im:presence
GatewayWS:
  AllowedOrigins: http://localhost:5173,http://127.0.0.1:5173
  AllowQueryToken: true
  PingIntervalSeconds: 30
  HeartbeatTimeoutSeconds: 75
  CommandRateLimitPerSecond: 20
  CommandRateLimitBurst: 40
