Name: msgtransfer

WorkerID: ${HOSTNAME}
DryRun: true
StorageDriver: memory
DataSource: ${DATABASE_URL}

Consumer:
  Driver: outbox

Dispatcher:
  Driver: gateway
  GatewayEndpoint: http://127.0.0.1:8084

Worker:
  PollIntervalMillis: 100
  RetryBackoffMillis: 1000
  MaxAttempts: 5

Observability:
  Enabled: true
  Host: 127.0.0.1
  Port: 8087
