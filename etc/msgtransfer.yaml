Name: msgtransfer

WorkerID: ${HOSTNAME}
DryRun: true
StorageDriver: memory
DataSource: ${DATABASE_URL}

Worker:
  PollIntervalMillis: 100
  RetryBackoffMillis: 1000
  MaxAttempts: 5

Observability:
  Enabled: true
  Host: 127.0.0.1
  Port: 8087

# Kafka 链路是唯一消费路径（03 §9 B3b）：本地由 dev-up/docker-compose 起 redpanda，
# KAFKA_BROKERS 默认 localhost:19092；缺 brokers 启动失败。
Kafka:
  Enabled: true
  Brokers: ${KAFKA_BROKERS}
