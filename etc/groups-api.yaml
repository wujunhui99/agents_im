Name: groups-api
Host: 0.0.0.0
Port: 8085

Auth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
GroupsRPC:
  Endpoints:
    - 127.0.0.1:9093
  Timeout: 5000
UserRPC:
  Endpoints:
    - 127.0.0.1:9090
  Timeout: 5000
# go-zero 自带 tracing：本地上报到 docker-compose 的 tempo（OTLP gRPC）。
Telemetry:
  Name: groups-api
  Endpoint: 127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc

Redis:
  Addr: localhost:6379
  Password: ""
  DB: 0
