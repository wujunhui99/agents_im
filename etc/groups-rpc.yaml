Name: groups-rpc
ListenOn: 0.0.0.0:9093
Tracing:
  Enabled: false
  ServiceName: groups-rpc
  Environment: local
  Protocol: grpc
  SamplerRatio: 1.0
  TraceUIBaseURL: http://localhost:3000
  Insecure: true

JWTAuth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
StorageDriver: memory
DataSource: ${DATABASE_URL}
