Name: friends-api
Host: 0.0.0.0
Port: 8082

Auth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
FriendsRPC:
  Endpoints:
    - 127.0.0.1:9092
  Timeout: 5000
UserRPC:
  Endpoints:
    - 127.0.0.1:9090
  Timeout: 5000

Redis:
  Addr: localhost:6379
  Password: ""
  DB: 0

Telemetry:
  Name: friends-api
  Endpoint: 127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc
