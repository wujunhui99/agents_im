Name: msg-rpc
ListenOn: 0.0.0.0:9098

DataSource: ${DATABASE_URL}
# go-zero 自带 tracing：本地上报到 docker-compose 的 tempo（OTLP gRPC）。
Telemetry:
  Name: msg-rpc
  Endpoint: 127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc

# AI 托管运行时（keystone 例外：随 message-api 退役迁入，待 03 §9 B1 迁 msgtransfer）。
DeepSeek:
  APIKey: ${DEEPSEEK_API_KEY}
  BaseURL: ${DEEPSEEK_BASE_URL}
  Model: ${DEEPSEEK_MODEL}
LLMObservability:
  Enabled: false
  Backend: ${LLM_OBSERVABILITY_BACKEND}
  CaptureOutput: false
  MaxOutputBytes: 2048
  Langfuse:
    Host: ${LANGFUSE_HOST}
    PublicKey: ${LANGFUSE_PUBLIC_KEY}
    SecretKey: ${LANGFUSE_SECRET_KEY}
PythonExecutor:
  Backend: disabled
  DefaultTimeoutSeconds: 10
  MaxTimeoutSeconds: 30
  DefaultMemoryMiB: 256
  MaxMemoryMiB: 256
  MaxOutputBytes: 65536
  K8S:
    Namespace:
    Image:
    ServiceAccountName:
    RuntimeClassName:
