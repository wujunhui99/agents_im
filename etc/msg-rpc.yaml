Name: msg-rpc
ListenOn: 0.0.0.0:9098

DataSource: ${DATABASE_URL}

# UserRPC：AI 托管 agent-create 工具路径账号读写经属主 user-rpc（gate #550，脱 internal accountRepo）。
UserRPC:
  Endpoints:
    - 127.0.0.1:9090
  Timeout: 5000

# go-zero 自带 tracing：本地上报到 docker-compose 的 tempo（OTLP gRPC）。
Telemetry:
  Name: msg-rpc
  Endpoint: 127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc

# AI 托管运行时（keystone 例外：随 message-api 退役迁入，待 03 §9 B1 迁 msgtransfer）。
DeepSeek:
  APIKey: ${DEEPSEEK_API_KEY}
  BaseURL: ${DEEPSEEK_BASE_URL}
  Model: ${DEEPSEEK_MODEL}
LLMObservability:
  Enabled: false
  Backend: ${LLM_OBSERVABILITY_BACKEND}
  CaptureOutput: false
  MaxOutputBytes: 2048
  Langfuse:
    Host: ${LANGFUSE_HOST}
    PublicKey: ${LANGFUSE_PUBLIC_KEY}
    SecretKey: ${LANGFUSE_SECRET_KEY}
PythonExecutor:
  Backend: disabled
  DefaultTimeoutSeconds: 10
  MaxTimeoutSeconds: 30
  DefaultMemoryMiB: 256
  MaxMemoryMiB: 256
  MaxOutputBytes: 65536
  K8S:
    Namespace:
    Image:
    ServiceAccountName:
    RuntimeClassName:

# Kafka 是唯一写链路（03 §9 B3b 退役旧 PG 同步写）：缺 brokers 启动失败；
# 本地 redpanda 由 dev-up/docker-compose 提供（KAFKA_BROKERS 默认 localhost:19092）。
Kafka:
  Enabled: true
  Brokers: ${KAFKA_BROKERS}
