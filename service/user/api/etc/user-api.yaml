Name: user-api
Host: 0.0.0.0
Port: 8080
Tracing:
  Enabled: false
  ServiceName: user-api
  Environment: local
  Protocol: grpc
  SamplerRatio: 1.0
  TraceUIBaseURL: http://localhost:3000
  Insecure: true

Auth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
UserRPC:
  Endpoints:
    - 127.0.0.1:9090
  Timeout: 5000

Redis:
  Addr: localhost:6379
  Password: ""
  DB: 0
