syntax = "proto3";

package user.v1;

option go_package = "github.com/wujunhui99/agents_im/proto/userpb";

// UserService is the V0 transport name for the account/profile service.
// New domain documentation should refer to Account Service semantics; public
// user_id fields remain account_id aliases for compatibility. Account IDs are
// Snowflake numeric strings without type prefixes.
service UserService {
  rpc CreateUser(CreateUserRequest) returns (UserResponse);
  rpc GetUserByIdentifier(GetUserByIdentifierRequest) returns (UserResponse);
  rpc ExistsByIdentifier(ExistsByIdentifierRequest) returns (ExistsByIdentifierResponse);
  rpc GetUserByID(GetUserByIDRequest) returns (UserResponse);
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UserResponse);
  rpc UpdateUserAvatar(UpdateUserAvatarRequest) returns (UserResponse);
}

// User is the V0 transport message for an Account/Profile aggregate. user_id is
// the compatibility alias for internal account_id.
message User {
  string user_id = 1;
  string identifier = 2;
  string display_name = 3;
  string name = 4;
  string gender = 5;
  string birth_date = 6;
  string region = 7;
  string created_at = 8;
  string updated_at = 9;
  string account_type = 10;
  string avatar_media_id = 11;
  string email = 12;
  string avatar_url = 13;
}

message CreateUserRequest {
  string identifier = 1;
  string display_name = 2;
  string name = 3;
  string gender = 4;
  string birth_date = 5;
  string region = 6;
  string account_type = 7;
  string email = 8;
}

message GetUserByIdentifierRequest {
  string identifier = 1;
}

message ExistsByIdentifierRequest {
  string identifier = 1;
}

message ExistsByIdentifierResponse {
  string identifier = 1;
  bool exists = 2;
}

message GetUserByIDRequest {
  string user_id = 1;
}

message UpdateUserProfileRequest {
  string user_id = 1;
  optional string display_name = 2;
  optional string name = 3;
  optional string gender = 4;
  optional string birth_date = 5;
  optional string region = 6;
}

message UpdateUserAvatarRequest {
  string user_id = 1;
  string media_id = 2;
}

message UserResponse {
  User user = 1;
}
