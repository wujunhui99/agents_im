syntax = "proto3";

package user.v1;

option go_package = "github.com/wujunhui99/agents_im/service/user/rpc/user";

// User is the V0 transport name for the account/profile service.
// New domain documentation should refer to Account Service semantics; public
// user_id fields remain account_id aliases for compatibility. Account IDs are
// Snowflake numeric strings without type prefixes.
service User {
  rpc CreateUser(CreateUserRequest) returns (UserResponse);
  rpc GetUserByIdentifier(GetUserByIdentifierRequest) returns (UserResponse);
  rpc ExistsByIdentifier(ExistsByIdentifierRequest) returns (ExistsByIdentifierResponse);
  rpc GetUserByID(GetUserByIDRequest) returns (UserResponse);
  // GetUsersByIDs 批量获取用户资料：一条 WHERE id IN (...) 取代 N 次 GetUserByID。
  // 不存在的 id 静默跳过（返回找到的子集，不报错），调用方按需比对缺失。
  rpc GetUsersByIDs(GetUsersByIDsRequest) returns (GetUsersByIDsResponse);
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UserResponse);
  rpc UpdateUserAvatar(UpdateUserAvatarRequest) returns (UserResponse);
  // CreateTestAccount 创建管理后台用的测试账户（account_type=test，不绑定邮箱）。
  // 只建 accounts+profiles；登录凭据由 auth 域负责（BFF 编排调用 auth-rpc）。
  // 幂等：identifier 已存在且为 test 账户时返回该账户（already_exists=true），
  // 已存在但非 test 账户时报 AlreadyExists。
  rpc CreateTestAccount(CreateTestAccountRequest) returns (CreateTestAccountResponse);
}

// UserEntity is the V0 transport message for an Account/Profile aggregate. user_id is
// the compatibility alias for internal account_id.
message UserEntity {
  string user_id = 1;
  string identifier = 2;
  string display_name = 3;
  string name = 4;
  string gender = 5;
  string birth_date = 6;
  string region = 7;
  string created_at = 8;
  string updated_at = 9;
  string account_type = 10;
  string avatar_media_id = 11;
  string email = 12;
  string avatar_url = 13;
}

message CreateUserRequest {
  string identifier = 1;
  string display_name = 2;
  string name = 3;
  string gender = 4;
  string birth_date = 5;
  string region = 6;
  string account_type = 7;
  string email = 8;
  // email_verified_at: RFC3339 时间戳(空串=未验证)。auth 注册校验邮箱后经此带入,
  // 落 accounts.email_verified_at;不传则为 NULL(未验证)。
  string email_verified_at = 9;
}

message GetUserByIdentifierRequest {
  string identifier = 1;
}

message ExistsByIdentifierRequest {
  string identifier = 1;
}

message ExistsByIdentifierResponse {
  string identifier = 1;
  bool exists = 2;
}

message GetUserByIDRequest {
  string user_id = 1;
}

message GetUsersByIDsRequest {
  repeated string user_ids = 1;
}

message GetUsersByIDsResponse {
  repeated UserEntity users = 1;
}

message UpdateUserProfileRequest {
  string user_id = 1;
  optional string display_name = 2;
  optional string name = 3;
  optional string gender = 4;
  optional string birth_date = 5;
  optional string region = 6;
}

message UpdateUserAvatarRequest {
  string user_id = 1;
  // avatar_media_id is the uploaded media object to validate and attach as the
  // profile avatar. The name intentionally matches UserEntity.avatar_media_id; HTTP
  // compatibility may still accept legacy JSON field mediaId at the BFF layer.
  string avatar_media_id = 2;
}

message UserResponse {
  UserEntity user = 1;
}

message CreateTestAccountRequest {
  string identifier = 1;
  string display_name = 2;
}

message CreateTestAccountResponse {
  UserEntity user = 1;
  bool already_exists = 2;
}
