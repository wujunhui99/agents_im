Name: groups-api
Host: 0.0.0.0
Port: 8085
Auth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
GroupsRPC:
  Endpoints:
    - 127.0.0.1:9093
  Timeout: 5000
Tracing:
  Enabled: false
  ServiceName: groups-api
  Environment: local
  Protocol: grpc
  SamplerRatio: 1.0
  TraceUIBaseURL: http://localhost:3000
  Insecure: true
