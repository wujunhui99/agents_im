Name: groups-api
Host: 0.0.0.0
Port: 8085
Auth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
GroupsRPC:
  Endpoints:
    - 127.0.0.1:9093
  Timeout: 5000
UserRPC:
  Endpoints:
    - 127.0.0.1:9090
  Timeout: 5000
# tracing: go-zero 自带 Telemetry。本地默认不配（Endpoint 空 = 关闭）；生产见 deploy/k8s/etc/。
