syntax = "proto3";

package groups.v1;

option go_package = "github.com/wujunhui99/agents_im/service/groups/rpc/groups";

service Groups {
  rpc CreateGroup(CreateGroupRequest) returns (GroupResponse);
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse);
  rpc GetGroup(GetGroupRequest) returns (GroupResponse);
  rpc UpdateGroup(UpdateGroupRequest) returns (GroupResponse);
  rpc AddMember(AddMemberRequest) returns (MemberResponse);
  rpc JoinGroup(JoinGroupRequest) returns (MemberResponse);
  rpc LeaveGroup(LeaveGroupRequest) returns (MemberResponse);
  rpc KickMember(KickMemberRequest) returns (MemberResponse);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  // IsMember 判定 user_id 当前是否为 group_id 的 active 成员（媒体下载授权 §4 群聊校验）。
  rpc IsMember(IsMemberRequest) returns (IsMemberResponse);
}

message Group {
  string group_id = 1;
  string name = 2;
  string description = 3;
  string announcement = 4;
  string avatar_media_id = 5;
  string avatar_url = 6;
  string creator_user_id = 7;
  string current_user_role = 8;
  string created_at = 9;
  string updated_at = 10;
}

message GroupMember {
  string group_id = 1;
  string user_id = 2;
  string role = 3;
  string state = 4;
  string joined_at = 5;
  string left_at = 6;
  string identifier = 7;
  string display_name = 8;
  string name = 9;
  string avatar_media_id = 10;
  string avatar_url = 11;
}

message CreateGroupRequest {
  string creator_user_id = 1;
  string name = 2;
  string description = 3;
  repeated string member_user_ids = 4;
}

message ListGroupsRequest {
  string user_id = 1;
}

message GetGroupRequest {
  string group_id = 1;
  string requester_user_id = 2;
}

message UpdateGroupRequest {
  string group_id = 1;
  string operator_user_id = 2;
  string name = 3;
  string description = 4;
  string announcement = 5;
}

message AddMemberRequest {
  string group_id = 1;
  string operator_user_id = 2;
  string user_id = 3;
}

message JoinGroupRequest {
  string group_id = 1;
  string user_id = 2;
}

message LeaveGroupRequest {
  string group_id = 1;
  string user_id = 2;
}

message KickMemberRequest {
  string group_id = 1;
  string operator_user_id = 2;
  string user_id = 3;
}

message ListMembersRequest {
  string group_id = 1;
  string requester_user_id = 2;
}

message GroupResponse {
  Group group = 1;
}

message ListGroupsResponse {
  repeated Group groups = 1;
}

message MemberResponse {
  GroupMember member = 1;
  bool already_member = 2;
}

message ListMembersResponse {
  string group_id = 1;
  repeated GroupMember members = 2;
}

message IsMemberRequest {
  string group_id = 1;
  string user_id = 2;
}

message IsMemberResponse {
  bool is_member = 1;
}
