Name: agent-api
Host: 0.0.0.0
Port: 8086
Tracing:
  Enabled: false
  ServiceName: agent-api
  Environment: local
  Protocol: grpc
  SamplerRatio: 1.0
  TraceUIBaseURL: http://localhost:3000
  Insecure: true

Auth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400
StorageDriver: memory
DataSource: ${DATABASE_URL}
DeepSeek:
  APIKey: ${DEEPSEEK_API_KEY}
  BaseURL: ${DEEPSEEK_BASE_URL}
  Model: ${DEEPSEEK_MODEL}
LLMObservability:
  Enabled: false
  Backend: ${LLM_OBSERVABILITY_BACKEND}
  CaptureOutput: false
  MaxOutputBytes: 2048
  Langfuse:
    Host: ${LANGFUSE_HOST}
    PublicKey: ${LANGFUSE_PUBLIC_KEY}
    SecretKey: ${LANGFUSE_SECRET_KEY}
PythonExecutor:
  Backend: disabled

Redis:
  Addr: localhost:6379
  Password: ""
  DB: 0
