Name: agent-api
Host: 0.0.0.0
Port: 8086
Tracing:
  Enabled: false
  ServiceName: agent-api
  Environment: local
  Protocol: grpc
  SamplerRatio: 1.0
  TraceUIBaseURL: http://localhost:3000
  Insecure: true

Auth:
  AccessSecret: dev-jwt-secret-change-me
  AccessExpire: 86400

# agent-api 转纯 BFF（#606）：agent CRUD / 定义经属主 agent-rpc gRPC，不再 in-process logic / 直连 DB。
AgentRPC:
  Endpoints:
    - 127.0.0.1:9099
  Timeout: 5000

Redis:
  Addr: localhost:6379
  Password: ""
  DB: 0
