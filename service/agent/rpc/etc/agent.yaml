# agent-rpc 本地默认配置（`go run ./service/agent/rpc`）。dev 用 scripts/dev/etc/agent-rpc.yaml.tmpl
# 渲染、部署用 deploy/k8s/etc/agent-rpc.yaml。gRPC server（AI 托管开关 CRUD）+ agent.trigger.v1
# 消费 worker（D15 终判 → runtime → imadapter 写回）。
Name: agent-rpc
ListenOn: 127.0.0.1:9099

DataSource: ${DATABASE_URL}

# AI 回复写回经属主 msg-rpc gRPC SendMessage（imadapter）。
MsgRPC:
  Endpoints:
    - 127.0.0.1:9098
  Timeout: 5000
# agent-create 工具账号读写经属主 user-rpc。
UserRPC:
  Endpoints:
    - 127.0.0.1:9090
  Timeout: 5000
# agent-create / 默认助手好友建立经属主 friends-rpc（#606，单向叶子，不成环）。
FriendsRPC:
  Endpoints:
    - 127.0.0.1:9092
  Timeout: 5000

# DeepSeek / LLMObservability 的默认值/env 覆盖由 struct tag 声明（#664）：
# APIKey←env DEEPSEEK_API_KEY；BaseURL/Model 缺省走 tag default，env DEEPSEEK_BASE_URL/MODEL 覆盖。
# Backend 缺省 noop，env LLM_OBSERVABILITY_BACKEND 覆盖。整块从 yaml 删除，避免空 ${VAR} 压掉 default。
PythonExecutor:
  Backend: disabled

# agent.trigger.v1 消费（独立 consumer group）；env KAFKA_BROKERS 覆盖。
Kafka:
  Brokers: ${KAFKA_BROKERS}
  Group: agent-trigger
