syntax = "proto3";

package agent.v1;

option go_package = "github.com/wujunhui99/agents_im/service/agent/rpc/agent";

// Agent 是 agent 域 RPC（04-agent §3.2，#340）。agent-rpc 同时是 agent.trigger.v1
// 的消费者 worker（见 agent.go）。数据 owner = agent 域：#606 起 agents 表 + agent 定义
// （系统提示词 + 工具绑定）数据层脱 internal/，gRPC 面新增 agent CRUD + 定义 + 默认助手装配，
// 供 agent-api BFF（去 in-process logic / 去直连 DB）与 user-rpc 装配编排消费。
service Agent {
  // AI 托管开关：普通用户在双人单聊里开关「由 AI 代我回复」。
  rpc GetConversationAIHosting(GetConversationAIHostingRequest) returns (ConversationAIHostingState);
  rpc UpdateConversationAIHosting(UpdateConversationAIHostingRequest) returns (ConversationAIHostingState);

  // ---- agent CRUD（#606，agent-api BFF 经此面，不再 in-process logic / 直连 DB）----
  rpc CreateAgent(CreateAgentRequest) returns (AgentResponse);
  rpc GetAgent(GetAgentRequest) returns (AgentResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc UpdateAgent(UpdateAgentRequest) returns (AgentResponse);
  rpc UpdateAgentStatus(UpdateAgentStatusRequest) returns (AgentResponse);

  // ---- agent 定义（系统提示词 + 工具绑定）----
  rpc GetAgentDefinition(GetAgentDefinitionRequest) returns (AgentDefinitionResponse);
  rpc UpdateAgentDefinition(UpdateAgentDefinitionRequest) returns (AgentDefinitionResponse);

  // EnsureDefaultAssistant 幂等装配默认助手的 agent 域部分（agent 行 + 提示词 + 工具绑定）。
  // 由 user-rpc 装配编排调用（账号属 user 域已建，好友由 user-rpc 经 friends-rpc 建）。
  rpc EnsureDefaultAssistant(EnsureDefaultAssistantRequest) returns (EnsureDefaultAssistantResponse);

  // ---- agent 审计只读面（#616：admin-rpc traces/dashboard 经此读，脱 internal/repository agent_audit）----
  // agent 审计四表（agent_runs/tool_calls/file_reads/python_execs）是 agent 域自有 append-only 数据，
  // 写路径在 agent-rpc orchestrator，只读 owner API 在此供 admin-rpc BFF 聚合 traces/dashboard。
  // summary jsonb 经 *_summary_json 串行携带；时间为 RFC3339Nano（零值空串）。
  rpc ListAgentRuns(ListAgentRunsRequest) returns (ListAgentRunsResponse);
  rpc CountAgentRuns(CountAgentRunsRequest) returns (CountAgentRunsResponse);
  rpc GetAgentRun(GetAgentRunRequest) returns (AgentRunAudit);
  rpc GetAgentRunByTraceID(GetAgentRunByTraceIDRequest) returns (AgentRunAudit);
  rpc ListAgentToolCallsByRunID(ListAuditByRunIDRequest) returns (ListAgentToolCallsResponse);
  rpc ListAgentFileReadsByRunID(ListAuditByRunIDRequest) returns (ListAgentFileReadsResponse);
  rpc ListAgentPythonExecsByRunID(ListAuditByRunIDRequest) returns (ListAgentPythonExecsResponse);
}

// ---- agent CRUD ----
message AgentEntity {
  string agent_id = 1;
  string account_id = 2;
  string im_user_id = 3;
  string name = 4;
  string description = 5;
  string status = 6;
  string created_by = 7;
  string created_at = 8;
  string updated_at = 9;
}

message CreateAgentRequest {
  string account_id = 1;
  string im_user_id = 2;
  string name = 3;
  string description = 4;
  string status = 5;
  string created_by = 6;
}

message AgentResponse {
  AgentEntity agent = 1;
}

message GetAgentRequest {
  string agent_id = 1;
}

message ListAgentsRequest {
  string status = 1;
  string created_by = 2;
  int64 limit = 3;
  int64 offset = 4;
}

message ListAgentsResponse {
  repeated AgentEntity agents = 1;
}

message UpdateAgentRequest {
  string agent_id = 1;
  optional string name = 2;
  optional string description = 3;
}

message UpdateAgentStatusRequest {
  string agent_id = 1;
  string status = 2;
}

// ---- agent 定义 ----
message AgentPromptDefinition {
  string prompt_id = 1;
  string name = 2;
  string description = 3;
  string content = 4;
  string variables_schema_json = 5;
  string version = 6;
  string status = 7;
  string created_by = 8;
  string created_at = 9;
  string updated_at = 10;
}

message AgentToolDefinition {
  string tool_id = 1;
  string name = 2;
  string description = 3;
  string tool_type = 4;
  string mcp_server_id = 5;
  string mcp_tool_name = 6;
  string local_handler_key = 7;
  string builtin_key = 8;
  string input_schema_json = 9;
  string output_schema_json = 10;
  string permission_level = 11;
  string status = 12;
  bool admin_configured = 13;
}

message AgentDefinition {
  AgentEntity agent = 1;
  AgentPromptDefinition system_prompt = 2;
  repeated AgentToolDefinition tools = 3;
}

message GetAgentDefinitionRequest {
  string agent_id = 1;
  string requested_by = 2;
}

message UpdateAgentDefinitionRequest {
  string agent_id = 1;
  string system_prompt = 2;
  repeated string tool_names = 3;
  string updated_by = 4;
}

message AgentDefinitionResponse {
  AgentDefinition definition = 1;
}

// ---- 默认助手装配 ----
message EnsureDefaultAssistantRequest {
  string account_id = 1;
}

message EnsureDefaultAssistantResponse {
  string agent_id = 1;
  string prompt_id = 2;
}

// ---- ConversationAIHosting ----
message GetConversationAIHostingRequest {
  string owner_account_id = 1;
  string conversation_id = 2;
}

message UpdateConversationAIHostingRequest {
  string owner_account_id = 1;
  string conversation_id = 2;
  bool enabled = 3;
}

message ConversationAIHostingState {
  string conversation_id = 1;
  string chat_type = 2;
  bool enabled = 3;
  bool available = 4;
  bool peer_enabled = 5;
  string unavailable_reason = 6;
  int64 max_recent_messages = 7;
  bool summary_enabled = 8;
}

// ---- agent 审计（只读 owner API；id 为 string，summary jsonb 用 *_summary_json 串行，时间 RFC3339Nano）----
message AgentRunAudit {
  string run_id = 1;
  string agent_id = 2;
  string conversation_id = 3;
  string trigger_message_id = 4;
  string requesting_user_id = 5;
  string status = 6;
  string input_summary_json = 7;
  string output_summary_json = 8;
  string output_message_id = 9;
  string error_code = 10;
  string error_message = 11;
  string trace_id = 12;
  string request_id = 13;
  string started_at = 14;
  string finished_at = 15;
  string created_at = 16;
}

message AgentToolCallAudit {
  string tool_call_id = 1;
  string run_id = 2;
  string agent_id = 3;
  string tool_id = 4;
  string tool_name = 5;
  string status = 6;
  string input_summary_json = 7;
  string output_summary_json = 8;
  int64 duration_ms = 9;
  string error_code = 10;
  string error_message = 11;
  string trace_id = 12;
  string request_id = 13;
  string started_at = 14;
  string finished_at = 15;
  string created_at = 16;
}

message AgentFileReadAudit {
  string file_read_id = 1;
  string run_id = 2;
  string agent_id = 3;
  string skill_id = 4;
  string file_id = 5;
  string object_key = 6;
  string sha256 = 7;
  string status = 8;
  int64 byte_count = 9;
  string content_summary_json = 10;
  string error_code = 11;
  string error_message = 12;
  string trace_id = 13;
  string request_id = 14;
  string started_at = 15;
  string finished_at = 16;
  string created_at = 17;
}

message AgentPythonExecAudit {
  string python_exec_id = 1;
  string run_id = 2;
  string agent_id = 3;
  string sandbox_request_id = 4;
  string status = 5;
  string code_summary_json = 6;
  string resource_summary_json = 7;
  string stdout_summary_json = 8;
  string stderr_summary_json = 9;
  string result_summary_json = 10;
  string error_code = 11;
  string error_message = 12;
  string trace_id = 13;
  string request_id = 14;
  string started_at = 15;
  string finished_at = 16;
  string created_at = 17;
}

message ListAgentRunsRequest {
  string status = 1;
  int64 limit = 2;
  int64 offset = 3;
}

message ListAgentRunsResponse {
  repeated AgentRunAudit runs = 1;
}

message CountAgentRunsRequest {
  string status = 1;
}

message CountAgentRunsResponse {
  int64 count = 1;
}

message GetAgentRunRequest {
  string run_id = 1;
}

message GetAgentRunByTraceIDRequest {
  string trace_id = 1;
}

message ListAuditByRunIDRequest {
  string run_id = 1;
}

message ListAgentToolCallsResponse {
  repeated AgentToolCallAudit tool_calls = 1;
}

message ListAgentFileReadsResponse {
  repeated AgentFileReadAudit file_reads = 1;
}

message ListAgentPythonExecsResponse {
  repeated AgentPythonExecAudit python_execs = 1;
}
