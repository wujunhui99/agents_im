syntax = "proto3";

package media.v1;

option go_package = "github.com/wujunhui99/agents_im/service/media/rpc/media";

// Media owns the object-storage lifecycle (avatar/attachment upload, completion,
// download/display presigned URLs) AND media reference validation. Callers that
// reference media (user-rpc set-avatar, message send) validate ownership/status/
// type via the Validate* RPCs instead of reading media_objects directly — media-rpc
// owns the table, all writes, the object store, and the validation rules (#533).
service Media {
  rpc CreateUploadIntent(CreateUploadIntentRequest) returns (CreateUploadIntentResponse);
  rpc CompleteUpload(CompleteUploadRequest) returns (CompleteUploadResponse);
  rpc GetDownloadURL(GetDownloadURLRequest) returns (GetDownloadURLResponse);
  rpc GetAvatarDisplayURL(GetAvatarDisplayURLRequest) returns (GetDownloadURLResponse);
  // ValidateAvatarMedia asserts media_id is a ready avatar object owned by owner_user_id
  // with an allowed content_type and size. Returns InvalidArgument/Forbidden/NotFound on
  // failure; an empty response on success (#533, replaces internal/mediavalidate).
  rpc ValidateAvatarMedia(ValidateAvatarMediaRequest) returns (ValidateMediaResponse);
  // ValidateMessageMedia asserts the attachment referenced by a message's content JSON
  // ("image"|"file") is a ready, owner-owned media object of the matching purpose with
  // allowed type/size (and, for files, content metadata matching the media object).
  rpc ValidateMessageMedia(ValidateMessageMediaRequest) returns (ValidateMediaResponse);
}

message MediaObject {
  string media_id = 1;
  string owner_user_id = 2;
  string bucket = 3;
  string object_key = 4;
  string sha256 = 5;
  string content_type = 6;
  int64 size_bytes = 7;
  int32 width = 8;
  int32 height = 9;
  string original_filename = 10;
  string purpose = 11;
  string status = 12;
  string created_at = 13;
  string updated_at = 14;
}

message CreateUploadIntentRequest {
  string owner_user_id = 1;
  string purpose = 2;
  string filename = 3;
  string content_type = 4;
  int64 size_bytes = 5;
  string sha256 = 6;
  int32 width = 7;
  int32 height = 8;
}

message CreateUploadIntentResponse {
  string media_id = 1;
  string object_key = 2;
  string upload_url = 3;
  int64 expires_at = 4;
  // already_complete is true on a file-level instant upload (秒传): object_key
  // agents_im/{sha256} already existed, so a ready media row was created without
  // any bytes transfer. The client then skips the PUT + CompleteUpload entirely
  // (upload_url is empty, expires_at is 0). EPIC #527 §3.
  bool already_complete = 5;
}

message CompleteUploadRequest {
  string owner_user_id = 1;
  string media_id = 2;
}

message CompleteUploadResponse {
  MediaObject media = 1;
}

message GetDownloadURLRequest {
  string owner_user_id = 1;
  string requester_user_id = 2;
  string media_id = 3;
  // msg_id 是引用该媒体的消息 id(雪花,十进制串)。非 uploader 下载时必传:media 编排
  // GetMessageRef(msg_id) 拿会话引用做链路校验(返回 media_id 必须等于入参 media_id,防越权)
  // + 私聊单向好友 / 群成员校验(EPIC #527 §4)。uploader 本人下载走快速放行,可不传。
  string msg_id = 4;
}

message GetDownloadURLResponse {
  string media_id = 1;
  string download_url = 2;
  int64 expires_at = 3;
}

message GetAvatarDisplayURLRequest {
  string media_id = 1;
}

message ValidateAvatarMediaRequest {
  string owner_user_id = 1;
  string media_id = 2;
}

message ValidateMessageMediaRequest {
  string owner_user_id = 1;
  // content_type is the message kind: "image" or "file".
  string content_type = 2;
  // content is the message content JSON carrying the media reference
  // (image: {mediaId,width,height}; file: {mediaId,filename,sizeBytes,contentType}).
  string content = 3;
}

// ValidateMediaResponse is intentionally empty: success is signalled by a nil
// error, failure by a gRPC status mapped from apperror.
message ValidateMediaResponse {}
