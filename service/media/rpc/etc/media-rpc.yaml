Name: media-rpc
ListenOn: 0.0.0.0:9096

DataSource: ${DATABASE_URL}

# 下载授权编排（EPIC #527 §4）：链路校验经 msg-rpc，私聊单向好友经 friends-rpc，群成员经 groups-rpc。
MsgRPC:
  Endpoints:
    - msg-rpc:9098
  Timeout: 5000
FriendsRPC:
  Endpoints:
    - friends-rpc:9092
  Timeout: 5000
GroupsRPC:
  Endpoints:
    - groups-rpc:9103
  Timeout: 5000

Telemetry:
  Name: media-rpc
  Endpoint: 127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc
