# 本地 Tempo 配置（docker-compose 用），镜像与生产一致 grafana/tempo:2.6.1。
# 镜像/接收器对齐 deploy/k8s/tempo.yaml；本地 trace 存 /tmp（短期、容器内、免卷权限问题）。
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks
