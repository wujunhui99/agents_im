services:
  postgres:
    image: postgres:16-alpine
    container_name: agents-im-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agents_im}
      POSTGRES_USER: ${POSTGRES_USER:-agents_im}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - agents_im_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: agents-im-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-redis-password}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-change-me-redis-password}"]
    ports:
      - "${REDIS_PORT:-127.0.0.1:6379}:6379"
    volumes:
      - agents_im_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 12

  # 对象存储：RustFS（S3 兼容，替代 MinIO，见 issue #569）。S3 客户端配置（OBJECT_STORAGE_*）
  # 不变，经 127.0.0.1:9000 直连。
  rustfs:
    image: rustfs/rustfs:1.0.0-beta.8
    container_name: agents-im-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_ACCESS_KEY: ${OSS_ROOT_USER:-change-me-oss-user}
      RUSTFS_SECRET_KEY: ${OSS_ROOT_PASSWORD:-change-me-oss-password}
    ports:
      - "${OSS_API_PORT:-127.0.0.1:9000}:9000"
      - "${OSS_CONSOLE_PORT:-127.0.0.1:9001}:9001"
    volumes:
      - agents_im_rustfs_data:/data

volumes:
  agents_im_pg_data:
  agents_im_redis_data:
  agents_im_rustfs_data:
