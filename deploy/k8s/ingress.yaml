apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agents-im
  namespace: agents-im
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - agenticim.xyz
      secretName: agenticim-xyz-tls
    - hosts:
        - ms.agenticim.xyz
      secretName: ms-agenticim-xyz-tls
  rules:
    - host: agenticim.xyz
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-api
                port:
                  number: 8081
          - path: /me
            pathType: Prefix
            backend:
              service:
                name: user-api
                port:
                  number: 8080
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-api
                port:
                  number: 8080
          - path: /friends
            pathType: Prefix
            backend:
              service:
                name: friends-api
                port:
                  number: 8082
          - path: /messages
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /conversations
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/dashboard
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/llm-traces
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/conversations
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/users
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /api/admin/feedback
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /api/admin/task-reports
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /groups
            pathType: Prefix
            backend:
              service:
                name: groups-api
                port:
                  number: 8085
          - path: /media
            pathType: Prefix
            backend:
              service:
                name: user-api
                port:
                  number: 8080
          - path: /agents
            pathType: Prefix
            backend:
              service:
                name: agent-api
                port:
                  number: 8086
          - path: /agents-im-media
            pathType: Prefix
            backend:
              service:
                name: agents-im-minio
                port:
                  number: 9000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: gateway-ws
                port:
                  number: 8084
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
    - host: ms.agenticim.xyz
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-api
                port:
                  number: 8081
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-api
                port:
                  number: 8080
          - path: /accounts
            pathType: Prefix
            backend:
              service:
                name: user-api
                port:
                  number: 8080
          - path: /admin/dashboard
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/llm-traces
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/conversations
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/users
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /api/admin/feedback
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /api/admin/task-reports
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: admin-legacy-redirect
  namespace: agents-im
spec:
  redirectRegex:
    regex: ^https?://admin\.agenticim\.xyz(.*)
    replacement: https://ms.agenticim.xyz${1}
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agents-im-admin-legacy
  namespace: agents-im
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: agents-im-admin-legacy-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - admin.agenticim.xyz
      secretName: admin-agenticim-xyz-tls
  rules:
    - host: admin.agenticim.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: observability-basic-auth
  namespace: agents-im
spec:
  basicAuth:
    secret: observability-basic-auth
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agents-im-langfuse
  namespace: agents-im
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - langfuse.agenticim.xyz
      secretName: langfuse-agenticim-xyz-tls
  rules:
    - host: langfuse.agenticim.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse
                port:
                  number: 3000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: observability-logs-redirect
  namespace: agents-im
spec:
  redirectRegex:
    regex: '^https?://ms\.agenticim\.xyz/observability/logs/?(.*)'
    replacement: 'https://grafana.agenticim.xyz/explore?orgId=1&schemaVersion=1&panes=%7B%22agenticim%22%3A%7B%22datasource%22%3A%22loki%22%2C%22queries%22%3A%5B%7B%22refId%22%3A%22A%22%2C%22datasource%22%3A%7B%22type%22%3A%22loki%22%2C%22uid%22%3A%22loki%22%7D%2C%22expr%22%3A%22%7Bnamespace%3D%5C%22agents-im%5C%22%7D%22%7D%5D%2C%22range%22%3A%7B%22from%22%3A%22now-1h%22%2C%22to%22%3A%22now%22%7D%7D%7D'
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: observability-traces-redirect
  namespace: agents-im
spec:
  redirectRegex:
    regex: '^https?://ms\.agenticim\.xyz/observability/traces/?(.*)'
    replacement: 'https://grafana.agenticim.xyz/explore?orgId=1&schemaVersion=1&panes=%7B%22agenticim%22%3A%7B%22datasource%22%3A%22tempo%22%2C%22queries%22%3A%5B%7B%22refId%22%3A%22A%22%2C%22datasource%22%3A%7B%22type%22%3A%22tempo%22%2C%22uid%22%3A%22tempo%22%7D%2C%22queryType%22%3A%22traceql%22%2C%22query%22%3A%22%22%7D%5D%2C%22range%22%3A%7B%22from%22%3A%22now-1h%22%2C%22to%22%3A%22now%22%7D%7D%7D'
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: observability-llm-redirect
  namespace: agents-im
spec:
  redirectRegex:
    regex: '^https?://ms\.agenticim\.xyz/observability/llm/?(.*)'
    replacement: 'https://langfuse.agenticim.xyz/'
    permanent: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agents-im-observability-logs
  namespace: agents-im
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: agents-im-observability-logs-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ms.agenticim.xyz
      secretName: ms-agenticim-xyz-tls
  rules:
    - host: ms.agenticim.xyz
      http:
        paths:
          - path: /observability/logs
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
---
