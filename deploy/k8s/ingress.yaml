apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agents-im
  namespace: agents-im
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - agenticim.xyz
      secretName: agenticim-xyz-tls
    - hosts:
        - ms.agenticim.xyz
      secretName: ms-agenticim-xyz-tls
  rules:
    - host: agenticim.xyz
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-api
                port:
                  number: 8081
          - path: /me
            pathType: Prefix
            backend:
              service:
                name: user-api
                port:
                  number: 8080
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-api
                port:
                  number: 8080
          - path: /friends
            pathType: Prefix
            backend:
              service:
                name: friends-api
                port:
                  number: 8082
          - path: /messages
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /conversations
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/dashboard
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/llm-traces
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/conversations
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/users
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /groups
            pathType: Prefix
            backend:
              service:
                name: groups-api
                port:
                  number: 8085
          - path: /media
            pathType: Prefix
            backend:
              service:
                name: user-api
                port:
                  number: 8080
          - path: /agents
            pathType: Prefix
            backend:
              service:
                name: agent-api
                port:
                  number: 8086
          - path: /agents-im-media
            pathType: Prefix
            backend:
              service:
                name: agents-im-minio
                port:
                  number: 9000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: gateway-ws
                port:
                  number: 8084
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
    - host: ms.agenticim.xyz
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-api
                port:
                  number: 8081
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-api
                port:
                  number: 8080
          - path: /accounts
            pathType: Prefix
            backend:
              service:
                name: user-api
                port:
                  number: 8080
          - path: /admin/dashboard
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/llm-traces
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/conversations
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /admin/users
            pathType: Prefix
            backend:
              service:
                name: message-api
                port:
                  number: 8083
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: admin-legacy-redirect
  namespace: agents-im
spec:
  redirectRegex:
    regex: ^https?://admin\.agenticim\.xyz(.*)
    replacement: https://ms.agenticim.xyz${1}
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agents-im-admin-legacy
  namespace: agents-im
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: agents-im-admin-legacy-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - admin.agenticim.xyz
      secretName: admin-agenticim-xyz-tls
  rules:
    - host: admin.agenticim.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: observability-basic-auth
  namespace: agents-im
spec:
  basicAuth:
    secret: observability-basic-auth
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agents-im-jaeger
  namespace: agents-im
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: agents-im-observability-basic-auth@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - jaeger.agenticim.xyz
      secretName: jaeger-agenticim-xyz-tls
  rules:
    - host: jaeger.agenticim.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger-collector
                port:
                  number: 16686
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agents-im-langfuse
  namespace: agents-im
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - langfuse.agenticim.xyz
      secretName: langfuse-agenticim-xyz-tls
  rules:
    - host: langfuse.agenticim.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse
                port:
                  number: 3000
