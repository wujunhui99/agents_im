apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: agents-im
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse
  template:
    metadata:
      labels:
        app: langfuse
    spec:
      # The production middleware PostgreSQL runs on the node loopback address.
      # hostNetwork keeps LANGFUSE_DATABASE_URL consistent with the existing
      # agents_im single-server deployment contract.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: langfuse
          image: docker.io/langfuse/langfuse:2
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agents-im-secrets
                  key: LANGFUSE_DATABASE_URL
            - name: NEXTAUTH_URL
              value: https://langfuse.agenticim.xyz
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: agents-im-secrets
                  key: NEXTAUTH_SECRET
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: agents-im-secrets
                  key: SALT
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: agents-im-secrets
                  key: ENCRYPTION_KEY
            # Explicit Redis wiring. The in-namespace `redis` Service makes
            # Kubernetes auto-inject REDIS_PORT=tcp://<ip>:6379, which langfuse
            # parses as a numeric port and rejects (NaN). These override it and
            # point langfuse at the k8s Redis StatefulSet.
            - name: REDIS_HOST
              value: redis.agents-im.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_AUTH
              valueFrom:
                secretKeyRef:
                  name: agents-im-secrets
                  key: REDIS_PASSWORD
            - name: TELEMETRY_ENABLED
              value: "false"
            - name: LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES
              value: "false"
            - name: HOSTNAME
              value: "0.0.0.0"
          ports:
            - name: http
              containerPort: 3000
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse
  namespace: agents-im
spec:
  selector:
    app: langfuse
  ports:
    - name: http
      port: 3000
      targetPort: 3000
