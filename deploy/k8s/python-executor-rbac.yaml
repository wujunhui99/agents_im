apiVersion: v1
kind: Namespace
metadata:
  name: agent-python-sandbox
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: agent-python-sandbox
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: python-executor-controller
  namespace: agents-im
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: python-executor-controller
  namespace: agent-python-sandbox
automountServiceAccountToken: false
imagePullSecrets:
  - name: ghcr-pull-secret
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: python-executor-controller
  namespace: agent-python-sandbox
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: python-executor-controller
  namespace: agent-python-sandbox
subjects:
  - kind: ServiceAccount
    name: python-executor-controller
    namespace: agents-im
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: python-executor-controller
