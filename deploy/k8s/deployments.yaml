apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-api
  namespace: agents-im
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-api
  template:
    metadata:
      labels:
        app: user-api
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: user-api
          image: ghcr.io/wujunhui99/agents_im/user-api:latest
          imagePullPolicy: IfNotPresent
          args: ["-f", "/config/user-api.yaml"]
          envFrom:
            - configMapRef:
                name: agents-im-config
            - secretRef:
                name: agents-im-secrets
          volumeMounts:
            - name: etc-config
              mountPath: /config
              readOnly: true
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: etc-config
          configMap:
            name: agents-im-etc
---
