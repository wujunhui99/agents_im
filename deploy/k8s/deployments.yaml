apiVersion: apps/v1
kind: Deployment
metadata:
  name: msg-rpc
  namespace: agents-im
spec:
  replicas: 1
  selector:
    matchLabels:
      app: msg-rpc
  template:
    metadata:
      labels:
        app: msg-rpc
    spec:
      # AI 托管 PythonExecutor K8S backend 需要的 RBAC（随 message-api 退役迁入）。
      serviceAccountName: python-executor-controller
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: msg-rpc
          image: ghcr.io/wujunhui99/agents_im/msg-rpc:__IMAGE_TAG_REQUIRED__
          imagePullPolicy: IfNotPresent
          args: ["-f", "/config/msg-rpc.yaml"]
          env:
            # RoutedFlake (msg_id) 机器号。单副本下常量 "0" 即唯一。
            # ⚠️ 扩副本(replicas≥2)前必须改为 StatefulSet + 注入 POD_NAME 让
            #    ResolveMachineID 按 pod ordinal 发号,并删掉本常量,否则多副本
            #    同毫秒静默撞 ID。见 docs/design-docs/snowflake-id-generation.md。
            - name: AGENTS_IM_SNOWFLAKE_MACHINE_ID
              value: "0"
          envFrom:
            - configMapRef:
                name: agents-im-config
            - secretRef:
                name: agents-im-secrets
          volumeMounts:
            - name: etc-config
              mountPath: /config
              readOnly: true
          ports:
            - name: grpc
              containerPort: 9098
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: etc-config
          configMap:
            name: agents-im-etc
---
