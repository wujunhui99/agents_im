apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-im-minio-proxy
  namespace: agents-im
spec:
  # Retired: MinIO migrated into k8s; agents-im-minio Service now targets app: minio.
  # Kept at replicas 0 so Drone apply stays idempotent with the migrated state.
  replicas: 0
  selector:
    matchLabels:
      app: agents-im-minio-proxy
  template:
    metadata:
      labels:
        app: agents-im-minio-proxy
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: socat
          image: alpine/socat:1.8.0.3
          imagePullPolicy: IfNotPresent
          args:
            - tcp-listen:19000,fork,reuseaddr,bind=0.0.0.0
            - tcp-connect:127.0.0.1:9000
          ports:
            - name: http
              containerPort: 19000
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
