apiVersion: v1
kind: ConfigMap
metadata:
  name: agents-im-config
  namespace: agents-im
data:
  AGENTS_IM_ENV: "production"
  REDIS_ADDR: "127.0.0.1:6379"
  REDIS_DB: "0"
  KAFKA_BROKERS: "127.0.0.1:19092"
  KAFKA_MESSAGE_EVENTS_TOPIC: "message.events.v1"
  KAFKA_CONSUMER_GROUP: "message-transfer-worker"
  # Per-environment exact browser origins. Gray/staging overlays should set their own comma-separated origins.
  GATEWAY_WS_ALLOWED_ORIGINS: "https://agenticim.xyz"
  # Browser-native WebSocket uses /ws?token=[REDACTED] on the configured production origin.
  GATEWAY_WS_ALLOW_QUERY_TOKEN: "true"
  GATEWAY_WS_PING_INTERVAL_SECONDS: "30"
  GATEWAY_WS_HEARTBEAT_TIMEOUT_SECONDS: "75"
  GATEWAY_WS_COMMAND_RATE_LIMIT_PER_SECOND: "20"
  GATEWAY_WS_COMMAND_RATE_LIMIT_BURST: "40"
  MESSAGE_TRANSFER_OBSERVABILITY_PORT: "8087"
  DEEPSEEK_BASE_URL: "https://api.deepseek.com"
  DEEPSEEK_MODEL: "deepseek-v4-pro"
  PYTHON_EXECUTOR_BACKEND: "k8s"
  PYTHON_EXECUTOR_DEFAULT_TIMEOUT_SECONDS: "10"
  PYTHON_EXECUTOR_MAX_TIMEOUT_SECONDS: "30"
  PYTHON_EXECUTOR_DEFAULT_MEMORY_MIB: "256"
  PYTHON_EXECUTOR_MAX_MEMORY_MIB: "256"
  PYTHON_EXECUTOR_MAX_OUTPUT_BYTES: "65536"
  PYTHON_EXECUTOR_K8S_NAMESPACE: "agent-python-sandbox"
  PYTHON_EXECUTOR_K8S_IMAGE: "ghcr.io/wujunhui99/agents_im/python-sandbox:20260520100437-a8f2509b061c"
  PYTHON_EXECUTOR_K8S_SERVICE_ACCOUNT_NAME: "python-executor-controller"
  PYTHON_EXECUTOR_K8S_RUNTIME_CLASS_NAME: ""
