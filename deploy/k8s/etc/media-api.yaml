Name: media-api
Host: 0.0.0.0
Port: 8089

Auth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
MediaRPC:
  Endpoints:
    - media-rpc:9096
  Timeout: 5000

# go-zero 自带 tracing：endpoint 由 ConfigMap 注入的 AGENTS_IM_OTLP_ENDPOINT 提供（空则关闭）。
Telemetry:
  Name: media-api
  Endpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Sampler: 1.0
  Batcher: otlpgrpc
