Name: agent-api
Host: 0.0.0.0
Port: 8086

Auth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400

# agent-api 转纯 BFF（#606）：agent CRUD / 定义经属主 agent-rpc gRPC，不再 in-process logic / 直连 DB。
AgentRPC:
  Endpoints:
    - agent-rpc:9099
  Timeout: 5000

Redis:
  Addr: ${REDIS_ADDR}
  Password: ${REDIS_PASSWORD}
  DB: ${REDIS_DB}
