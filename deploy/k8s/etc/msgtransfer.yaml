Name: msgtransfer
WorkerID: ${HOSTNAME}
DryRun: false
StorageDriver: postgres
DataSource: ${DATABASE_URL}

Consumer:
  # Legacy live push consumes durable message_outbox rows written by msg-rpc non-Kafka mode（03 §9 B3b 退役）.
  Driver: outbox

Dispatcher:
  Driver: gateway
  GatewayEndpoint: http://127.0.0.1:8084

Worker:
  PollIntervalMillis: 100
  RetryBackoffMillis: 1000
  MaxAttempts: 5

Observability:
  Enabled: true
  Host: 0.0.0.0
  Port: ${MESSAGE_TRANSFER_OBSERVABILITY_PORT}

# Kafka 写链路（03 §9 B1，additive）：B2 前无人向 msg.toTransfer.v1 生产（dormant），
# Redis 经 REDIS_ADDR/REDIS_PASSWORD env 解析。
Kafka:
  Enabled: true
  Brokers: redpanda.agents-im.svc.cluster.local:9092
