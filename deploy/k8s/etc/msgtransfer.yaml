Name: msgtransfer
WorkerID: ${HOSTNAME}
DryRun: false
StorageDriver: postgres
DataSource: ${DATABASE_URL}

Consumer:
  # Production live push consumes durable message_outbox rows written by msg-rpc / gateway-ws.
  Driver: outbox

Dispatcher:
  Driver: gateway
  GatewayEndpoint: http://127.0.0.1:8084

Worker:
  PollIntervalMillis: 100
  RetryBackoffMillis: 1000
  MaxAttempts: 5

Observability:
  Enabled: true
  Host: 0.0.0.0
  Port: ${MESSAGE_TRANSFER_OBSERVABILITY_PORT}
