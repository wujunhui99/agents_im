Name: auth-api
Host: 0.0.0.0
Port: 8081

Auth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
AdminBootstrap:
  Identifier: ${ADMIN_BOOTSTRAP_IDENTIFIER}
  Password: ${ADMIN_BOOTSTRAP_PASSWORD}
  DisplayName: ${ADMIN_BOOTSTRAP_DISPLAY_NAME}
StorageDriver: postgres
DataSource: ${DATABASE_URL}
Tracing:
  Enabled: true
  ServiceName: auth-api
  Environment: ${AGENTS_IM_ENV}
  OTLPEndpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Protocol: ${AGENTS_IM_OTLP_PROTOCOL}
  SamplerRatio: 1.0
  JaegerBaseURL: ${AGENTS_IM_JAEGER_BASE_URL}
  Insecure: true
MailRPC:
  Endpoints:
    - mail-rpc:9095
  Timeout: 5000
