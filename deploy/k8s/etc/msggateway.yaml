Name: msggateway
Host: 0.0.0.0
Port: 8084

# 下行推送 gRPC server（03 §6.2）：service/push 经 headless Service 广播 BatchPushOneMsg。
# 端口 9101（非 9100）：msggateway 用 hostNetwork，9100 已被 node-exporter hostPort 占用（#599）。
GatewayGRPC:
  ListenOn: 0.0.0.0:9101

Auth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
MsgRPC:
  Target: dns:///msg-rpc:9098
  Timeout: 5000
Presence:
  Driver: redis
  HeartbeatTTLSeconds: 60
  KeyPrefix: agents_im:presence
GatewayWS:
  # Environment-specific exact browser origins, for example production or gray/staging hostnames.
  AllowedOrigins:
    - ${GATEWAY_WS_ALLOWED_ORIGINS}
  # Browser-native WebSocket cannot set Authorization headers; keep origins explicit behind ingress.
  AllowQueryToken: true
  PingIntervalSeconds: 30
  HeartbeatTimeoutSeconds: 75
  CommandRateLimitPerSecond: 20
  CommandRateLimitBurst: 40
Redis:
  Addr: ${REDIS_ADDR}
  Password: ${REDIS_PASSWORD}
  DB: ${REDIS_DB}
