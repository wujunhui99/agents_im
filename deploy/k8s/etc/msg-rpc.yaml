Name: msg-rpc
ListenOn: 0.0.0.0:9098

DataSource: ${DATABASE_URL}

# UserRPC：AI 托管 agent-create 工具路径账号读写经属主 user-rpc（gate #550，脱 internal accountRepo）。
UserRPC:
  Endpoints:
    - user-rpc:9090
  Timeout: 5000

# MediaRPC：SendMessage 写路径图片/文件附件校验经属主 media-rpc（#533，脱 internal/mediavalidate）。
MediaRPC:
  Endpoints:
    - media-rpc:9096
  Timeout: 5000

# go-zero 自带 tracing：endpoint 由 OTLP collector 注入（空则关闭）。
Telemetry:
  Name: msg-rpc
  Endpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Sampler: 1.0
  Batcher: otlpgrpc

# AI 托管运行时（keystone 例外：随 message-api 退役迁入，待 03 §9 B1 迁 msgtransfer）。
DeepSeek:
  APIKey: ${DEEPSEEK_API_KEY}
  BaseURL: ${DEEPSEEK_BASE_URL}
  Model: ${DEEPSEEK_MODEL}
LLMObservability:
  Enabled: false
  Backend: ${LLM_OBSERVABILITY_BACKEND}
  CaptureOutput: false
  MaxOutputBytes: 2048
  Langfuse:
    Host: ${LANGFUSE_HOST}
    PublicKey: ${LANGFUSE_PUBLIC_KEY}
    SecretKey: ${LANGFUSE_SECRET_KEY}
PythonExecutor:
  Backend: ${PYTHON_EXECUTOR_BACKEND}
  DefaultTimeoutSeconds: ${PYTHON_EXECUTOR_DEFAULT_TIMEOUT_SECONDS}
  MaxTimeoutSeconds: ${PYTHON_EXECUTOR_MAX_TIMEOUT_SECONDS}
  DefaultMemoryMiB: ${PYTHON_EXECUTOR_DEFAULT_MEMORY_MIB}
  MaxMemoryMiB: ${PYTHON_EXECUTOR_MAX_MEMORY_MIB}
  MaxOutputBytes: ${PYTHON_EXECUTOR_MAX_OUTPUT_BYTES}
  K8S:
    Namespace: ${PYTHON_EXECUTOR_K8S_NAMESPACE}
    Image: ${PYTHON_EXECUTOR_K8S_IMAGE}
    ServiceAccountName: ${PYTHON_EXECUTOR_K8S_SERVICE_ACCOUNT_NAME}
    RuntimeClassName: ${PYTHON_EXECUTOR_K8S_RUNTIME_CLASS_NAME}

# Kafka 是唯一写链路（03 §9 B3b：旧 PG 同步写已退役，缺 brokers 启动失败）：SendMessage 只 publish msg.toTransfer.v1，
# ACK seq=0 占位。回滚：给 deployment 加 MSG_DIRECT_KAFKA=false（env 优先，秒级）。
Kafka:
  Enabled: true
  Brokers: redpanda.agents-im.svc.cluster.local:9092
