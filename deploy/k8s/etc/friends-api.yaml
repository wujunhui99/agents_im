Name: friends-api
Host: 0.0.0.0
Port: 8082

Auth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
StorageDriver: postgres
DataSource: ${DATABASE_URL}
Tracing:
  Enabled: ${AGENTS_IM_TRACING_ENABLED}
  Environment: ${AGENTS_IM_ENV}
  OTLPEndpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Protocol: ${AGENTS_IM_OTLP_PROTOCOL}
  SamplerRatio: ${AGENTS_IM_TRACING_SAMPLER_RATIO}
  JaegerBaseURL: ${AGENTS_IM_JAEGER_BASE_URL}
