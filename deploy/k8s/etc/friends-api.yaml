Name: friends-api
Host: 0.0.0.0
Port: 8082

Auth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
FriendsRPC:
  Target: dns:///friends-rpc:9092
  Timeout: 5000
# UserRPC：BFF 聚合用，补全好友资料（friends rpc 不再跨域读用户表）。
UserRPC:
  Endpoints:
    - user-rpc:9090
  Timeout: 5000

Redis:
  Addr: ${REDIS_ADDR}
  Password: ${REDIS_PASSWORD}
  DB: ${REDIS_DB}
