Name: friends-api
Host: 0.0.0.0
Port: 8082

Auth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
FriendsRPC:
  Target: dns:///friends-rpc:9092
  Timeout: 5000
# UserRPC：BFF 聚合用，补全好友资料（friends rpc 不再跨域读用户表）。
UserRPC:
  Endpoints:
    - user-rpc:9090
  Timeout: 5000

Redis:
  Addr: ${REDIS_ADDR}
  Password: ${REDIS_PASSWORD}
  DB: ${REDIS_DB}

# go-zero 自带 tracing：endpoint 由 ConfigMap 注入的 AGENTS_IM_OTLP_ENDPOINT 提供（空则关闭）。
Telemetry:
  Name: friends-api
  Endpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Sampler: 1.0
  Batcher: otlpgrpc
