Name: auth-rpc
ListenOn: 0.0.0.0:9091

TokenAuth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
DataSource: ${DATABASE_URL}
MailRPC:
  Endpoints:
    - third-rpc:9095
  Timeout: 5000
# UserRPC：注册/登录读用户资料经属主 user-rpc（#551，脱 internal/logic.UserLogic）。
UserRPC:
  Endpoints:
    - user-rpc:9090
  Timeout: 5000

SessionRedis:
  Addr: ${REDIS_ADDR}
  Password: ${REDIS_PASSWORD}
  DB: ${REDIS_DB}

# go-zero 自带 tracing：endpoint 由 ConfigMap 注入的 AGENTS_IM_OTLP_ENDPOINT 提供（空则关闭）。
Telemetry:
  Name: auth-rpc
  Endpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Sampler: 1.0
  Batcher: otlpgrpc
