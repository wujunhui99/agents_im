Name: auth-rpc
ListenOn: 0.0.0.0:9091

TokenAuth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
AdminBootstrap:
  Identifier: ${ADMIN_BOOTSTRAP_IDENTIFIER}
  Password: ${ADMIN_BOOTSTRAP_PASSWORD}
  DisplayName: ${ADMIN_BOOTSTRAP_DISPLAY_NAME}
StorageDriver: postgres
DataSource: ${DATABASE_URL}
MailRPC:
  Endpoints:
    - third-rpc:9095
  Timeout: 5000

SessionRedis:
  Addr: ${REDIS_ADDR}
  Password: ${REDIS_PASSWORD}
  DB: ${REDIS_DB}

# go-zero 自带 tracing：endpoint 由 ConfigMap 注入的 AGENTS_IM_OTLP_ENDPOINT 提供（空则关闭）。
Telemetry:
  Name: auth-rpc
  Endpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Sampler: 1.0
  Batcher: otlpgrpc
