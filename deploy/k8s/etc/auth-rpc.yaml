Name: auth-rpc
ListenOn: 0.0.0.0:9091

TokenAuth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
StorageDriver: postgres
DataSource: ${DATABASE_URL}
Tracing:
  Enabled: true
  ServiceName: auth-rpc
  Environment: ${AGENTS_IM_ENV}
  OTLPEndpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Protocol: ${AGENTS_IM_OTLP_PROTOCOL}
  SamplerRatio: 1.0
  TraceUIBaseURL: ${AGENTS_IM_TRACE_UI_BASE_URL}
  Insecure: true
MailRPC:
  Endpoints:
    - mail-rpc:9095
  Timeout: 5000
