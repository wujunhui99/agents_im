Name: user-api
Host: 0.0.0.0
Port: 8080

Auth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
StorageDriver: postgres
DataSource: ${DATABASE_URL}
Tracing:
  Enabled: ${AGENTS_IM_TRACING_ENABLED}
  Environment: ${AGENTS_IM_ENV}
  OTLPEndpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Protocol: ${AGENTS_IM_OTLP_PROTOCOL}
  SamplerRatio: ${AGENTS_IM_TRACING_SAMPLER_RATIO}
  JaegerBaseURL: ${AGENTS_IM_JAEGER_BASE_URL}
ObjectStorage:
  Driver: ${OBJECT_STORAGE_DRIVER}
  Endpoint: ${OBJECT_STORAGE_ENDPOINT}
  ExternalEndpoint: ${OBJECT_STORAGE_EXTERNAL_ENDPOINT}
  Bucket: ${OBJECT_STORAGE_BUCKET}
  Region: ${OBJECT_STORAGE_REGION}
  UseSSL: ${OBJECT_STORAGE_USE_SSL}
  ExternalUseSSL: ${OBJECT_STORAGE_EXTERNAL_USE_SSL}
  AccessKeyID: ${OBJECT_STORAGE_ACCESS_KEY_ID}
  SecretAccessKey: ${OBJECT_STORAGE_SECRET_ACCESS_KEY}
