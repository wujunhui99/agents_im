Name: user-api
Host: 0.0.0.0
Port: 8080

Auth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
Tracing:
  Enabled: true
  ServiceName: user-api
  Environment: ${AGENTS_IM_ENV}
  OTLPEndpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Protocol: ${AGENTS_IM_OTLP_PROTOCOL}
  SamplerRatio: 1.0
  TraceUIBaseURL: ${AGENTS_IM_TRACE_UI_BASE_URL}
  Insecure: true
UserRPC:
  Endpoints:
    - user-rpc:9090
  Timeout: 5000
