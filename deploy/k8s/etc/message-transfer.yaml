Name: message-transfer
WorkerID: ${HOSTNAME}
DryRun: false
StorageDriver: postgres
DataSource: ${DATABASE_URL}
Tracing:
  Enabled: true
  ServiceName: message-transfer
  Environment: ${AGENTS_IM_ENV}
  OTLPEndpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Protocol: ${AGENTS_IM_OTLP_PROTOCOL}
  SamplerRatio: 1.0
  JaegerBaseURL: ${AGENTS_IM_JAEGER_BASE_URL}
  Insecure: true

Consumer:
  # Production live push consumes durable message_outbox rows written by message-api.
  # Kafka config remains below for future event-bus integrations, but V1 fanout must not
  # depend on a separate Kafka publish path when messages are already persisted.
  Driver: outbox
  Topic: ${KAFKA_MESSAGE_EVENTS_TOPIC}
  Group: ${KAFKA_CONSUMER_GROUP}

Kafka:
  Brokers: ${KAFKA_BROKERS}
  MessageEventsTopic: ${KAFKA_MESSAGE_EVENTS_TOPIC}
  ConsumerGroup: ${KAFKA_CONSUMER_GROUP}

Dispatcher:
  Driver: gateway
  GatewayEndpoint: http://127.0.0.1:8084

Worker:
  PollIntervalMillis: 100
  RetryBackoffMillis: 1000
  MaxAttempts: 5

Observability:
  Enabled: true
  Host: 0.0.0.0
  Port: ${MESSAGE_TRANSFER_OBSERVABILITY_PORT}
