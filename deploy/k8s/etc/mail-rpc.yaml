Name: mail-rpc
ListenOn: 0.0.0.0:9095
Tracing:
  Enabled: true
  ServiceName: mail-rpc
  Environment: ${AGENTS_IM_ENV}
  OTLPEndpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Protocol: ${AGENTS_IM_OTLP_PROTOCOL}
  SamplerRatio: 1.0
  TraceUIBaseURL: ${AGENTS_IM_TRACE_UI_BASE_URL}
  Insecure: true
TencentSES:
  SecretID: ${TENCENT_SES_SECRET_ID}
  SecretKey: ${TENCENT_SES_SECRET_KEY}
  Region: ${TENCENT_SES_REGION}
  Endpoint: https://ses.tencentcloudapi.com
  FromEmailAddress: ${TENCENT_SES_FROM_EMAIL}
  DefaultTemplateID: "${TENCENT_SES_DEFAULT_TEMPLATE_ID}"
