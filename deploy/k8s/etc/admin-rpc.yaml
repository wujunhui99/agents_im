Name: admin-rpc
ListenOn: 0.0.0.0:9097

# admin-rpc 数据层：task_reports 走 goctl model（Postgres-only）；
# accounts/friendships/messages/agent_audits/feedback 跨域只读经 internal/repository。
DataSource: ${DATABASE_URL}

# go-zero 自带 tracing：endpoint 由 ConfigMap 注入的 AGENTS_IM_OTLP_ENDPOINT 提供（空则关闭）。
Telemetry:
  Name: admin-rpc
  Endpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Sampler: 1.0
  Batcher: otlpgrpc
