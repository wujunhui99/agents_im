Name: admin-api
Host: 0.0.0.0
Port: 8088

Auth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
# admin-api 改纯 BFF：所有 DB 访问走 admin-rpc，不再有 StorageDriver/DataSource。
AdminRPC:
  Target: dns:///admin-rpc:9097
  Timeout: 5000
# UserRPC/AuthRPC：BFF 编排「创建测试账户」（user-rpc 建号 + auth-rpc 设凭据）。
UserRPC:
  Endpoints:
    - user-rpc:9090
  Timeout: 5000
AuthRPC:
  Endpoints:
    - auth-rpc:9091
  Timeout: 5000

Redis:
  Addr: ${REDIS_ADDR}
  Password: ${REDIS_PASSWORD}
  DB: ${REDIS_DB}

# go-zero 自带 tracing：endpoint 由 ConfigMap 注入的 AGENTS_IM_OTLP_ENDPOINT 提供（空则关闭）。
Telemetry:
  Name: admin-api
  Endpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Sampler: 1.0
  Batcher: otlpgrpc
