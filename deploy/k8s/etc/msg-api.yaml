Name: msg-api
Host: 0.0.0.0
Port: 8090

Auth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
MsgRPC:
  Target: dns:///msg-rpc:9098
  Timeout: 5000
# go-zero 自带 tracing：endpoint 由 ConfigMap 注入的 AGENTS_IM_OTLP_ENDPOINT 提供（空则关闭）。
Telemetry:
  Name: msg-api
  Endpoint: ${AGENTS_IM_OTLP_ENDPOINT}
  Sampler: 1.0
  Batcher: otlpgrpc

Redis:
  Addr: ${REDIS_ADDR}
  Password: ${REDIS_PASSWORD}
  DB: ${REDIS_DB}
