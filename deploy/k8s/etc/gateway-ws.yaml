Name: gateway-ws
Host: 0.0.0.0
Port: 8084

Auth:
  AccessSecret: ${JWT_ACCESS_SECRET}
  AccessExpire: 86400
StorageDriver: postgres
DataSource: ${DATABASE_URL}
Presence:
  Driver: redis
  HeartbeatTTLSeconds: 60
  KeyPrefix: agents_im:presence
GatewayWS:
  # Environment-specific exact browser origins, for example production or gray/staging hostnames.
  AllowedOrigins: ${GATEWAY_WS_ALLOWED_ORIGINS}
  # Browser-native WebSocket cannot set Authorization headers; keep origins explicit behind ingress.
  AllowQueryToken: true
  PingIntervalSeconds: 30
  HeartbeatTimeoutSeconds: 75
  CommandRateLimitPerSecond: 20
  CommandRateLimitBurst: 40
Redis:
  Addr: ${REDIS_ADDR}
  Password: ${REDIS_PASSWORD}
  DB: ${REDIS_DB}
