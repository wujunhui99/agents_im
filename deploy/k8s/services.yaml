apiVersion: v1
kind: Service
metadata:
  name: msggateway
  namespace: agents-im
spec:
  selector: { app: msggateway }
  ports:
    - { name: http, port: 8084, targetPort: 8084 }
    - { name: grpc, port: 9100, targetPort: 9100 }
---
# Headless Service: DNS A records resolve to EVERY msggateway pod IP, so
# service/push can dial each instance and broadcast BatchPushOneMsg (k8s-native
# service discovery, no etcd; 03 §6.2). Target: msggateway-headless:9100.
apiVersion: v1
kind: Service
metadata:
  name: msggateway-headless
  namespace: agents-im
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector: { app: msggateway }
  ports:
    - { name: grpc, port: 9100, targetPort: 9100 }
---
