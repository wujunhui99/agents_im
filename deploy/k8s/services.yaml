apiVersion: v1
kind: Service
metadata:
  name: agents-im-minio
  namespace: agents-im
spec:
  # Repointed to the in-cluster MinIO StatefulSet (middleware migrated to k8s).
  # The legacy socat proxy (agents-im-minio-proxy -> stopped docker minio) is retired.
  selector: { app: minio }
  ports:
    - name: http
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: agents-im
spec:
  type: NodePort
  selector: { app: web }
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
