apiVersion: v1
kind: Secret
metadata:
  name: agents-im-secrets
  namespace: agents-im
type: Opaque
stringData:
  JWT_ACCESS_SECRET: replace-with-random-jwt-secret
  ADMIN_BOOTSTRAP_IDENTIFIER: amin
  ADMIN_BOOTSTRAP_PASSWORD: replace-with-admin-password
  ADMIN_BOOTSTRAP_DISPLAY_NAME: 管理后台管理员
  DATABASE_URL: postgres://agents_im:***@127.0.0.1:5432/agents_im?sslmode=disable
  REDIS_PASSWORD: replace-with-redis-password
  OBJECT_STORAGE_DRIVER: rustfs
  OBJECT_STORAGE_ENDPOINT: oss.agents-im.svc.cluster.local:9000
  OBJECT_STORAGE_EXTERNAL_ENDPOINT: storage.example.com
  OBJECT_STORAGE_BUCKET: agents-im-media
  OBJECT_STORAGE_REGION: us-east-1
  OBJECT_STORAGE_USE_SSL: "false"
  OBJECT_STORAGE_EXTERNAL_USE_SSL: "true"
  OBJECT_STORAGE_ACCESS_KEY_ID: replace-with-oss-user
  OBJECT_STORAGE_SECRET_ACCESS_KEY: replace-with-oss-password
  DEEPSEEK_API_KEY: replace-with-deepseek-api-key
  LANGFUSE_PUBLIC_KEY: replace-with-langfuse-public-key
  LANGFUSE_SECRET_KEY: replace-with-langfuse-secret-key
  LANGFUSE_DATABASE_URL: postgres://agents_im:***@127.0.0.1:5432/langfuse?sslmode=disable
  NEXTAUTH_SECRET: replace-with-langfuse-nextauth-secret
  SALT: replace-with-langfuse-api-key-salt
  ENCRYPTION_KEY: replace-with-64-hex-character-langfuse-encryption-key
  TENCENT_SES_SECRET_ID: replace-with-tencent-ses-secret-id
  TENCENT_SES_SECRET_KEY: replace-with-tencent-ses-secret-key
---
apiVersion: v1
kind: Secret
metadata:
  name: observability-basic-auth
  namespace: agents-im
type: Opaque
stringData:
  # htpasswd-compatible value, for example generated with:
  # printf 'admin:$(openssl passwd -apr1)' > /tmp/users
  users: admin:$apr1$replace-with-htpasswd-md5-hash
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: agents-im
type: Opaque
stringData:
  admin-user: admin
  admin-password: replace-with-grafana-admin-password
