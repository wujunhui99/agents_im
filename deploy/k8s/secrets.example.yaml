apiVersion: v1
kind: Secret
metadata:
  name: agents-im-secrets
  namespace: agents-im
type: Opaque
stringData:
  JWT_ACCESS_SECRET: replace-with-random-jwt-secret
  ADMIN_BOOTSTRAP_IDENTIFIER: amin
  ADMIN_BOOTSTRAP_PASSWORD: replace-with-admin-password
  ADMIN_BOOTSTRAP_DISPLAY_NAME: 管理后台管理员
  DATABASE_URL: postgres://agents_im:***@127.0.0.1:5432/agents_im?sslmode=disable
  REDIS_PASSWORD: replace-with-redis-password
  OBJECT_STORAGE_DRIVER: minio
  OBJECT_STORAGE_ENDPOINT: 127.0.0.1:9000
  OBJECT_STORAGE_EXTERNAL_ENDPOINT: storage.example.com
  OBJECT_STORAGE_BUCKET: agents-im-media
  OBJECT_STORAGE_REGION: us-east-1
  OBJECT_STORAGE_USE_SSL: "false"
  OBJECT_STORAGE_EXTERNAL_USE_SSL: "true"
  OBJECT_STORAGE_ACCESS_KEY_ID: replace-with-minio-user
  OBJECT_STORAGE_SECRET_ACCESS_KEY: replace-with-minio-password
  DEEPSEEK_API_KEY: replace-with-deepseek-api-key
  TENCENT_SES_SECRET_ID: replace-with-tencent-ses-secret-id
  TENCENT_SES_SECRET_KEY: replace-with-tencent-ses-secret-key
