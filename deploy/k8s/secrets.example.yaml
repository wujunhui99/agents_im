apiVersion: v1
kind: Secret
metadata:
  name: agents-im-secrets
  namespace: agents-im
type: Opaque
stringData:
  JWT_ACCESS_SECRET: replace-with-random-jwt-secret
  DATABASE_URL: postgres://agents_im:replace-with-postgres-password@127.0.0.1:5432/agents_im?sslmode=disable
  REDIS_PASSWORD: replace-with-redis-password
  DEEPSEEK_API_KEY: replace-with-deepseek-api-key
