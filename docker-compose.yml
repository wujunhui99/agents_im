services:
  postgres:
    image: postgres:16-alpine
    container_name: agents-im-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agents_im}
      POSTGRES_USER: ${POSTGRES_USER:-agents_im}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agents_im_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agents_im_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: agents-im-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-agents_im_redis_dev_password}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-agents_im_redis_dev_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - agents_im_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 12

  # 对象存储：RustFS（S3 兼容，替代 MinIO，见 issue #569）。
  rustfs:
    image: rustfs/rustfs:1.0.0-beta.8
    container_name: agents-im-rustfs
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_ACCESS_KEY: ${OSS_ROOT_USER:-agents_im_oss}
      RUSTFS_SECRET_KEY: ${OSS_ROOT_PASSWORD:-agents_im_oss_dev_password}
    ports:
      - "${OSS_API_PORT:-9000}:9000"
      - "127.0.0.1:${OSS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - agents_im_rustfs_data:/data

  # 本地消息写链路 Kafka（03 §9 B3b：Kafka 是唯一写路径，msg-rpc/msgtransfer 启动必需）。
  # dev-container 模式不保 fsync，仅限本地；生产是 deploy/k8s/middleware/redpanda.yaml 单 broker。
  redpanda:
    image: redpandadata/redpanda:v25.3.15
    container_name: agents-im-redpanda
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 400M
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,EXTERNAL://localhost:${REDPANDA_KAFKA_PORT:-19092}
    ports:
      - "127.0.0.1:${REDPANDA_KAFKA_PORT:-19092}:19092"
    volumes:
      - agents_im_redpanda_data:/var/lib/redpanda/data

  # 本地分布式追踪后端，与生产一致（grafana/tempo:2.6.1）。
  # 主机上的服务经 OTLP gRPC 4317 上报；生产是 otel-collector→tempo，本地直连 tempo 的 OTLP 接收器。
  tempo:
    image: grafana/tempo:2.6.1
    container_name: agents-im-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "${TEMPO_OTLP_GRPC_PORT:-4317}:4317"
      - "${TEMPO_OTLP_HTTP_PORT:-4318}:4318"
      - "127.0.0.1:${TEMPO_HTTP_PORT:-3200}:3200"
    volumes:
      - ./deploy/local/tempo.yaml:/etc/tempo/tempo.yaml:ro

volumes:
  agents_im_pg_data:
  agents_im_redis_data:
  agents_im_rustfs_data:
  agents_im_redpanda_data:
