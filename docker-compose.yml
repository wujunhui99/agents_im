services:
  postgres:
    image: postgres:16-alpine
    container_name: agents-im-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agents_im}
      POSTGRES_USER: ${POSTGRES_USER:-agents_im}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agents_im_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agents_im_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: agents-im-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-agents_im_redis_dev_password}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-agents_im_redis_dev_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - agents_im_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 12

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.6
    container_name: agents-im-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "${REDPANDA_KAFKA_PORT:-19092}:19092"
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"
    volumes:
      - agents_im_redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.true'"]
      interval: 5s
      timeout: 5s
      retries: 24

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: agents-im-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agents_im_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agents_im_minio_dev_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - agents_im_minio_data:/data

volumes:
  agents_im_pg_data:
  agents_im_redis_data:
  agents_im_redpanda_data:
  agents_im_minio_data:
