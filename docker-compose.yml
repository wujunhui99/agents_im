services:
  postgres:
    image: postgres:16-alpine
    container_name: agents-im-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agents_im}
      POSTGRES_USER: ${POSTGRES_USER:-agents_im}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agents_im_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agents_im_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: agents-im-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-agents_im_redis_dev_password}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-agents_im_redis_dev_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - agents_im_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: agents-im-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agents_im_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agents_im_minio_dev_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - agents_im_minio_data:/data

  # 本地分布式追踪后端，与生产一致（grafana/tempo:2.6.1）。
  # 主机上的服务经 OTLP gRPC 4317 上报；生产是 otel-collector→tempo，本地直连 tempo 的 OTLP 接收器。
  tempo:
    image: grafana/tempo:2.6.1
    container_name: agents-im-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "${TEMPO_OTLP_GRPC_PORT:-4317}:4317"
      - "${TEMPO_OTLP_HTTP_PORT:-4318}:4318"
      - "127.0.0.1:${TEMPO_HTTP_PORT:-3200}:3200"
    volumes:
      - ./deploy/local/tempo.yaml:/etc/tempo/tempo.yaml:ro

volumes:
  agents_im_pg_data:
  agents_im_redis_data:
  agents_im_minio_data:
