syntax = "proto3";

package groups.v1;

option go_package = "github.com/wujunhui99/agents_im/proto/groupspb";

service GroupsService {
  rpc CreateGroup(CreateGroupRequest) returns (GroupResponse);
  rpc GetGroup(GetGroupRequest) returns (GroupResponse);
  rpc AddMember(AddMemberRequest) returns (MemberResponse);
  rpc JoinGroup(JoinGroupRequest) returns (MemberResponse);
  rpc LeaveGroup(LeaveGroupRequest) returns (MemberResponse);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
}

message Group {
  string group_id = 1;
  string name = 2;
  string description = 3;
  string creator_user_id = 4;
  string created_at = 5;
  string updated_at = 6;
}

message GroupMember {
  string group_id = 1;
  string user_id = 2;
  string state = 3;
  string joined_at = 4;
  string left_at = 5;
}

message CreateGroupRequest {
  string creator_user_id = 1;
  string name = 2;
  string description = 3;
}

message GetGroupRequest {
  string group_id = 1;
}

message AddMemberRequest {
  string group_id = 1;
  string operator_user_id = 2;
  string user_id = 3;
}

message JoinGroupRequest {
  string group_id = 1;
  string user_id = 2;
}

message LeaveGroupRequest {
  string group_id = 1;
  string user_id = 2;
}

message ListMembersRequest {
  string group_id = 1;
}

message GroupResponse {
  Group group = 1;
}

message MemberResponse {
  GroupMember member = 1;
  bool already_member = 2;
}

message ListMembersResponse {
  string group_id = 1;
  repeated GroupMember members = 2;
}
