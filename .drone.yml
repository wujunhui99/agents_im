---
kind: pipeline
name: verification
type: docker

trigger:
  event:
    - pull_request
  # PR 的 base 分支过滤必须用 branch；trigger.target 匹配的是 promote/rollback 的
  # deployment target，pull_request 事件下恒空 → pipeline 被静默跳过（#472）。
  branch:
    - main

services:
  - name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agents_im
      POSTGRES_USER: agents_im
      POSTGRES_PASSWORD: agents_im_dev_password
  - name: redis
    image: redis:7-alpine
  # msgtransfer Kafka 链路集成测试（dev-container 模式仅限 CI——关 fsync，禁用于生产）。
  - name: redpanda
    image: redpandadata/redpanda:v25.3.15
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 400M
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092

# 提速（#488/#521）：步骤 DAG 并行 + host 缓存卷 /opt/agents-im/ci-cache（repo trusted=true）。
# Go module/build cache 与 goctl 二进制跨构建复用；npm cache 同理。缓存卷在宿主常驻、
# 跨 build 持久（docker image prune 只动镜像层、不碰 host 卷），所以 postgres-integration
# 无需串在 backend 后等它焐热 GOCACHE——上一次 build 的热缓存已在，并行即享热缓存、走增量
# 编译（非整份全量），故全部 verify 步骤并行。
steps:
  # Always run PR policy gates, then compute the PR changeset for the expensive
  # verification steps below. Drone step conditions do not support path filters
  # on this runner, so each step sources .drone-changes.env and exits 0 unless
  # its owned paths changed.
  - name: detect changes
    image: alpine/git:2.45.2
    depends_on:
      - clone
    commands:
      - apk add --no-cache bash python3
      - bash scripts/ci/verify-agent-branch-name.sh
      - bash scripts/ci/verify-pr-issue-link.sh
      - bash scripts/ci/drone-detect-changes.sh .drone-changes.env

  - name: backend-verification
    image: golang:1.25-bookworm
    depends_on:
      - detect changes
    environment:
      GOMODCACHE: /ci-cache/go/mod
      GOCACHE: /ci-cache/go/build
      GOBIN: /ci-cache/go/bin
    commands:
      - bash scripts/ci/drone-run-if-required.sh backend_required "backend verification" bash scripts/ci/drone-backend-verify.sh
    volumes:
      - name: ci_cache
        path: /ci-cache

  - name: frontend-verification
    image: node:20-bookworm-slim
    depends_on:
      - detect changes
    environment:
      npm_config_cache: /ci-cache/npm
    commands:
      - bash scripts/ci/drone-run-if-required.sh frontend_required "frontend verification" bash scripts/ci/drone-frontend-verify.sh
    volumes:
      - name: ci_cache
        path: /ci-cache

  # 从 backend-verification 拆出（原先为跑 npx 在 golang 镜像里装 NodeSource node）。
  - name: markdown-link-check
    image: node:20-bookworm-slim
    depends_on:
      - detect changes
    commands:
      - bash scripts/ci/drone-run-if-required.sh markdown_required "markdown link check" bash scripts/ci/drone-markdown-link-check.sh
    volumes:
      - name: ci_cache
        path: /ci-cache

  - name: postgres-integration
    image: golang:1.25-bookworm
    depends_on:
      - detect changes
    environment:
      DATABASE_URL: postgres://agents_im:agents_im_dev_password@postgres:5432/agents_im?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      GOMODCACHE: /ci-cache/go/mod
      GOCACHE: /ci-cache/go/build
      GOBIN: /ci-cache/go/bin
    commands:
      - bash scripts/ci/drone-run-if-required.sh backend_required "postgres integration" bash scripts/ci/drone-postgres-integration.sh
    volumes:
      - name: ci_cache
        path: /ci-cache

  - name: notify telegram
    image: python:3.12-alpine
    depends_on:
      - detect changes
      - backend-verification
      - frontend-verification
      - markdown-link-check
      - postgres-integration
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: telegram_bot_token
      TELEGRAM_CHAT_ID:
        from_secret: telegram_chat_id
    commands:
      - python scripts/ci/drone-telegram-notify.py "$DRONE_BUILD_STATUS"
    when:
      status:
        - success
        - failure

volumes:
  - name: ci_cache
    host:
      path: /opt/agents-im/ci-cache

---
kind: pipeline
name: devops-lab
type: docker

trigger:
  event:
    - push
  branch:
    - devops

steps:
  - name: detect changes
    image: golang:1.25-alpine
    environment:
      GOMODCACHE: /ci-cache/go/mod
      GOCACHE: /ci-cache/go/build
    commands:
      - apk add --no-cache bash git python3
      - bash scripts/ci/drone-detect-deploy.sh .drone-deploy.env
    volumes:
      - name: ci_cache
        path: /ci-cache

  - name: build image benchmark
    image: docker.io/library/docker:29-cli
    depends_on:
      - detect changes
    environment:
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
      IMAGE_REGISTRY: ghcr.io/wujunhui99/agents_im
      DRONE_EXPORT_BACKEND_CACHE: "false"
      DRONE_EXPORT_WEB_CACHE: "true"
      DRONE_IMAGE_BUILD_FORCE_ALL: "true"
      DRONE_IMAGE_BUILD_ONLY: "true"
    commands:
      - apk add --no-cache bash python3
      - test -f .drone-deploy.env
      - bash scripts/ci/drone-build-images.sh
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

  - name: render deploy plan
    image: alpine:3.20
    depends_on:
      - detect changes
    commands:
      - apk add --no-cache bash python3 curl
      - curl -fsSL -o /usr/local/bin/kubectl https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl
      - chmod +x /usr/local/bin/kubectl
      - test -f .drone-deploy.env
      - . ./.drone-deploy.env
      - IMAGE_TAG="${DRONE_COMMIT_SHA}" SKIP_SET_IMAGE=false IMAGE_SERVICES="${image_services_space}" KUBECTL=kubectl ./scripts/deploy-k3s.sh --render-only >/tmp/rendered.yaml
      - test -s /tmp/rendered.yaml
      - '! grep -q "__IMAGE_TAG_REQUIRED__\|:latest" /tmp/rendered.yaml'

  - name: notify telegram
    image: python:3.12-alpine
    depends_on:
      - detect changes
      - build image benchmark
      - render deploy plan
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: telegram_bot_token
      TELEGRAM_CHAT_ID:
        from_secret: telegram_chat_id
    commands:
      - python scripts/ci/drone-telegram-notify.py "$DRONE_BUILD_STATUS"
    when:
      status:
        - success
        - failure

volumes:
  - name: ci_cache
    host:
      path: /opt/agents-im/ci-cache
  - name: docker_sock
    host:
      path: /var/run/docker.sock

---
kind: pipeline
name: deploy-main
type: docker

trigger:
  event:
    - push
  branch:
    - main

steps:
  - name: detect changes
    image: golang:1.25-alpine
    environment:
      GOMODCACHE: /ci-cache/go/mod
      GOCACHE: /ci-cache/go/build
    commands:
      - apk add --no-cache bash git python3
      - bash scripts/ci/drone-detect-deploy.sh .drone-deploy.env
    volumes:
      - name: ci_cache
        path: /ci-cache

  - name: build images
    image: docker.io/library/docker:29-cli
    depends_on:
      - detect changes
    environment:
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
      IMAGE_REGISTRY: ghcr.io/wujunhui99/agents_im
      DRONE_EXPORT_BACKEND_CACHE: "false"
      DRONE_EXPORT_WEB_CACHE: "true"
    commands:
      - apk add --no-cache bash python3
      - test -f .drone-deploy.env
      - bash scripts/ci/drone-build-images.sh
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

  - name: deploy
    image: alpine:3.20
    depends_on:
      - detect changes
      - build images
    environment:
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
      DRONE_DEPLOY_LOCAL: "1"
      IMAGE_REGISTRY: ghcr.io/wujunhui99/agents_im
    commands:
      - test -f .drone-deploy.env
      - if ! grep -q "^deploy_required=true$" .drone-deploy.env; then echo "No deployment required."; exit 0; fi
      - . ./.drone-deploy.env
      - apk add --no-cache bash python3 tar curl
      - if grep -q "^migration_required=true$" .drone-deploy.env; then apk add --no-cache docker-cli docker-cli-compose postgresql-client; fi
      - curl -fsSL -o /usr/local/bin/kubectl https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl
      - chmod +x /usr/local/bin/kubectl
      - mkdir -p /etc/rancher/k3s
      - cp /host/etc/rancher/k3s/k3s.yaml /etc/rancher/k3s/k3s.yaml
      - kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml config set-cluster default --server=https://host.docker.internal:6443 --insecure-skip-tls-verify=true
      - kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml config unset clusters.default.certificate-authority-data || true
      - bash scripts/ci/drone-deploy.sh
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock
      - name: host_opt_agents_im
        path: /opt/agents-im
      - name: host_k3s_config
        path: /host/etc/rancher/k3s
        read_only: true

  - name: notify telegram
    image: python:3.12-alpine
    depends_on:
      - detect changes
      - build images
      - deploy
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: telegram_bot_token
      TELEGRAM_CHAT_ID:
        from_secret: telegram_chat_id
    commands:
      - python scripts/ci/drone-telegram-notify.py "$DRONE_BUILD_STATUS"
    when:
      status:
        - success
        - failure

  # Terminal step: prunes the shared host daemon used by the Drone runner to
  # spawn step containers. Must depend on the last step (notify telegram) so it
  # never runs concurrently with another step's container startup — a parallel
  # `docker image prune` races containerd lease GC and breaks step creation
  # ("lease does not exist").
  #
  # Dangling-only (`-f`, NOT `-af --filter until=4h`): `until` filters on image
  # *Created* date (the upstream build date — months old for base images), not
  # pull recency, so the old form evicted golang/node/postgres/redis/redpanda
  # every deploy (~1.7GB) and the next PR re-pulled them (~45s on the
  # verification critical path, #519). Project images build via buildx --push
  # and never land in this daemon, so there is no project-image disk to reclaim
  # here — only dead layers, which `-f` removes while keeping base images warm.
  - name: prune images
    image: docker.io/library/docker:29-cli
    depends_on:
      - notify telegram
    commands:
      - docker image prune -f
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock
    when:
      status:
        - success
        - failure

volumes:
  - name: ci_cache
    host:
      path: /opt/agents-im/ci-cache
  - name: docker_sock
    host:
      path: /var/run/docker.sock
  - name: host_opt_agents_im
    host:
      path: /opt/agents-im
  - name: host_k3s_config
    host:
      path: /etc/rancher/k3s
