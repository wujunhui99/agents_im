---
kind: pipeline
name: verification
type: docker

trigger:
  event:
    - pull_request
  target:
    - main

services:
  - name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agents_im
      POSTGRES_USER: agents_im
      POSTGRES_PASSWORD: agents_im_dev_password

steps:
  - name: backend-verification
    image: golang:1.24-bookworm
    commands:
      - bash scripts/ci/verify-agent-branch-name.sh
      - bash scripts/ci/verify-pr-issue-link.sh
      - bash scripts/ci/drone-backend-verify.sh

  # Runs only when web-owned files change (Drone changeset filter). The deploy
  # detector (detect-deploy-changes.py) is unsuitable here: it is scoped to
  # main/devops refs and returns web_required=false for PR source branches.
  - name: frontend-verification
    image: node:20-bookworm-slim
    commands:
      - npm --prefix web ci
      - npm --prefix web run lint
      - npm --prefix web run test:run
      - npm --prefix web run build
    when:
      paths:
        include:
          - web/**
          - package.json
          - package-lock.json
          - .drone.yml

  - name: postgres-integration
    image: golang:1.24-bookworm
    environment:
      DATABASE_URL: postgres://agents_im:agents_im_dev_password@postgres:5432/agents_im?sslmode=disable
    commands:
      - bash scripts/ci/drone-postgres-integration.sh

  - name: notify telegram
    image: python:3.12-alpine
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: telegram_bot_token
      TELEGRAM_CHAT_ID:
        from_secret: telegram_chat_id
    commands:
      - python scripts/ci/drone-telegram-notify.py "$DRONE_BUILD_STATUS"
    when:
      status:
        - success
        - failure

volumes: []

---
kind: pipeline
name: devops-lab
type: docker

trigger:
  event:
    - push
  branch:
    - devops

steps:
  - name: detect changes
    image: alpine/git:2.45.2
    commands:
      - apk add --no-cache bash python3
      - bash scripts/ci/drone-detect-deploy.sh .drone-deploy.env

  - name: build image benchmark
    image: docker.io/library/docker:29-cli
    environment:
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
      IMAGE_REGISTRY: ghcr.io/wujunhui99/agents_im
      DRONE_EXPORT_BACKEND_CACHE: "false"
      DRONE_EXPORT_WEB_CACHE: "true"
      DRONE_IMAGE_BUILD_FORCE_ALL: "true"
      DRONE_IMAGE_BUILD_ONLY: "true"
    commands:
      - apk add --no-cache bash python3
      - test -f .drone-deploy.env || bash scripts/ci/drone-detect-deploy.sh .drone-deploy.env
      - bash scripts/ci/drone-build-images.sh
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

  - name: render deploy plan
    image: alpine:3.20
    depends_on:
      - detect changes
    commands:
      - apk add --no-cache bash python3 curl
      - curl -fsSL -o /usr/local/bin/kubectl https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl
      - chmod +x /usr/local/bin/kubectl
      - test -f .drone-deploy.env || bash scripts/ci/drone-detect-deploy.sh .drone-deploy.env
      - . ./.drone-deploy.env
      - IMAGE_TAG="${DRONE_COMMIT_SHA}" SKIP_SET_IMAGE=false IMAGE_SERVICES="${image_services_space}" KUBECTL=kubectl ./scripts/deploy-k3s.sh --render-only >/tmp/rendered.yaml
      - test -s /tmp/rendered.yaml
      - '! grep -q "__IMAGE_TAG_REQUIRED__\|:latest" /tmp/rendered.yaml'

  - name: notify telegram
    image: python:3.12-alpine
    depends_on:
      - detect changes
      - build image benchmark
      - render deploy plan
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: telegram_bot_token
      TELEGRAM_CHAT_ID:
        from_secret: telegram_chat_id
    commands:
      - python scripts/ci/drone-telegram-notify.py "$DRONE_BUILD_STATUS"
    when:
      status:
        - success
        - failure

volumes:
  - name: docker_sock
    host:
      path: /var/run/docker.sock

---
kind: pipeline
name: deploy-main
type: docker

trigger:
  event:
    - push
  branch:
    - main

steps:
  - name: detect changes
    image: alpine/git:2.45.2
    commands:
      - apk add --no-cache bash python3
      - bash scripts/ci/drone-detect-deploy.sh .drone-deploy.env

  - name: build images
    image: docker.io/library/docker:29-cli
    environment:
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
      IMAGE_REGISTRY: ghcr.io/wujunhui99/agents_im
      DRONE_EXPORT_BACKEND_CACHE: "false"
      DRONE_EXPORT_WEB_CACHE: "true"
    commands:
      - apk add --no-cache bash python3
      - test -f .drone-deploy.env || bash scripts/ci/drone-detect-deploy.sh .drone-deploy.env
      - bash scripts/ci/drone-build-images.sh
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

  - name: deploy
    image: alpine:3.20
    depends_on:
      - detect changes
      - build images
    environment:
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
      DRONE_DEPLOY_LOCAL: "1"
      IMAGE_REGISTRY: ghcr.io/wujunhui99/agents_im
    commands:
      - test -f .drone-deploy.env || (apk add --no-cache bash python3 && bash scripts/ci/drone-detect-deploy.sh .drone-deploy.env)
      - if ! grep -q "^deploy_required=true$" .drone-deploy.env; then echo "No deployment required."; exit 0; fi
      - . ./.drone-deploy.env
      - apk add --no-cache bash python3 tar curl
      - if [ "${migration_required:-false}" = "true" ]; then apk add --no-cache docker-cli docker-cli-compose postgresql-client; fi
      - curl -fsSL -o /usr/local/bin/kubectl https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl
      - chmod +x /usr/local/bin/kubectl
      - mkdir -p /etc/rancher/k3s
      - cp /host/etc/rancher/k3s/k3s.yaml /etc/rancher/k3s/k3s.yaml
      - kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml config set-cluster default --server=https://host.docker.internal:6443 --insecure-skip-tls-verify=true
      - kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml config unset clusters.default.certificate-authority-data || true
      - bash scripts/ci/drone-deploy.sh
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock
      - name: host_opt_agents_im
        path: /opt/agents-im
      - name: host_k3s_config
        path: /host/etc/rancher/k3s
        read_only: true

  - name: notify telegram
    image: python:3.12-alpine
    depends_on:
      - detect changes
      - build images
      - deploy
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: telegram_bot_token
      TELEGRAM_CHAT_ID:
        from_secret: telegram_chat_id
    commands:
      - python scripts/ci/drone-telegram-notify.py "$DRONE_BUILD_STATUS"
    when:
      status:
        - success
        - failure

  # Terminal step: prunes the shared host daemon used by the Drone runner to
  # spawn step containers. Must depend on the last step (notify telegram) so it
  # never runs concurrently with another step's container startup — a parallel
  # `docker image prune` races containerd lease GC and breaks step creation
  # ("lease does not exist"). until=4h keeps recently-pulled step images.
  - name: prune images
    image: docker.io/library/docker:29-cli
    depends_on:
      - notify telegram
    commands:
      - docker image prune -af --filter "until=4h"
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock
    when:
      status:
        - success
        - failure

volumes:
  - name: docker_sock
    host:
      path: /var/run/docker.sock
  - name: host_opt_agents_im
    host:
      path: /opt/agents-im
  - name: host_k3s_config
    host:
      path: /etc/rancher/k3s
